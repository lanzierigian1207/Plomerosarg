<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/Prueba_2/assets/logo-plomeros-circular.png">
  <link rel="apple-touch-icon" href="/Prueba_2/assets/logo-plomeros-circular.png">
  <title>Panel Admin | Inscripciones</title>
  <style>
    :root {
      --ink: #13233a;
      --muted: #4d627e;
      --bg: #eef4fb;
      --card: #ffffff;
      --line: #d3deec;
      --accent: #0f4ea8;
      --accent-soft: #e4efff;
      --ok: #1f7a45;
      --warn: #7f5a00;
      --off: #8f241f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: "Barlow", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at -10% -10%, #d9e9ff 0%, transparent 60%),
        radial-gradient(700px 400px at 110% 0%, #ffe9d0 0%, transparent 58%),
        var(--bg);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .top {
      background: linear-gradient(135deg, #0f4ea8 0%, #1d6fd0 100%);
      border-radius: 16px;
      color: #fff;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      box-shadow: 0 18px 30px rgba(14, 63, 134, 0.22);
    }

    .top h1 {
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .summary {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      color: #d9e9ff;
      font-weight: 600;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-weight: 700;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      background: #ffffff;
      color: var(--accent);
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .view-switch {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-view {
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      padding: 7px 12px;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-view.is-active {
      background: #ffffff;
      color: var(--accent);
      border-color: #ffffff;
    }

    .events {
      display: grid;
      gap: 14px;
    }

    .event-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    .event-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .event-title {
      font-size: 1.12rem;
      line-height: 1.2;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff;
      color: var(--ok);
      border: 1px solid #b8dec7;
      font-weight: 800;
      white-space: nowrap;
    }

    .counter-attendance {
      color: #0f7a45;
      border-color: #b7deca;
      background: #f3fcf7;
    }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-event {
      border: 1px solid #95b8ea;
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
      padding: 6px 11px;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-toggle {
      border-color: #d6b986;
      color: #7d4f00;
    }

    .btn-toggle.is-on {
      border-color: #c9e2d1;
      color: var(--ok);
    }

    .btn-toggle.is-off {
      border-color: #f1b5af;
      color: var(--off);
    }

    .btn-event:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .event-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 6px 10px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .event-state.is-on {
      color: var(--ok);
      border-color: #b8dec7;
      background: #f5fff9;
    }

    .event-state.is-off {
      color: var(--off);
      border-color: #f1b5af;
      background: #fff4f3;
    }

    .empty {
      padding: 16px;
      color: var(--muted);
      font-weight: 600;
    }

    .table-wrap {
      overflow: auto;
    }

    .rows-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 16px 16px;
      border-top: 1px solid #edf2f8;
      background: #fbfdff;
    }

    .rows-info {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      margin-right: 6px;
    }

    .attendance-box {
      margin: 14px 16px 0;
      padding: 12px;
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #f7fbff;
    }

    .attendance-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .attendance-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .attendance-input {
      width: 190px;
      max-width: 100%;
      border: 1px solid #afc4e5;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      font-size: 0.9rem;
      color: var(--ink);
      background: #fff;
    }

    .attendance-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
    }

    .attendance-error {
      margin-top: 8px;
      color: #8f241f;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .attendance-result {
      margin-top: 10px;
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #ffffff;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .attendance-row {
      font-size: 0.9rem;
      color: #213750;
    }

    .attendance-check-wrap {
      margin-top: 4px;
    }

    .btn-attendance-check {
      border: 0;
      border-radius: 999px;
      background: #188645;
      color: #fff;
      padding: 7px 13px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-attendance-check.is-done {
      background: #0f6f38;
    }

    .certificate-box {
      margin: 14px 16px 0;
      padding: 12px;
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #f7fbff;
      display: grid;
      gap: 10px;
    }

    .certificate-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--ink);
    }

    .certificate-hint {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .certificate-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .raffle-box {
      margin: 14px 16px 16px;
      padding: 14px;
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #f7fbff;
      display: grid;
      gap: 12px;
    }

    .raffle-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--ink);
    }

    .raffle-hint {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .raffle-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .raffle-count-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #d7e4f5;
      border-radius: 999px;
      background: #ffffff;
      padding: 7px 12px;
    }

    .raffle-count-label {
      color: #335173;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .raffle-count-input {
      width: 74px;
      border: 1px solid #c7d8ee;
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--ink);
      background: #fff;
    }

    .raffle-brand-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #d7e4f5;
      border-radius: 999px;
      background: #ffffff;
      padding: 7px 12px;
    }

    .raffle-brand-label {
      color: #335173;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .raffle-brand-select {
      min-width: 170px;
      border: 1px solid #c7d8ee;
      border-radius: 999px;
      padding: 6px 12px;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 700;
      color: var(--ink);
      background: #fff;
    }

    .raffle-brand-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid #edf3fb;
    }

    .raffle-brand-group:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .raffle-brand-logo {
      width: 88px;
      height: 52px;
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #fff;
      object-fit: contain;
      padding: 6px;
      flex: 0 0 auto;
    }

    .raffle-brand-info {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .raffle-brand-name {
      font-size: 0.84rem;
      font-weight: 800;
      color: var(--accent);
    }

    .raffle-brand-names {
      margin: 0;
      padding-left: 16px;
      display: grid;
      gap: 4px;
    }

    .raffle-screen {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(7, 20, 40, 0.78);
      backdrop-filter: blur(6px);
    }

    .raffle-screen.is-open {
      display: flex;
    }

    .raffle-screen-panel {
      width: min(1200px, 100%);
      min-height: min(82vh, 820px);
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background:
        radial-gradient(circle at top left, rgba(122, 173, 255, 0.28), transparent 38%),
        radial-gradient(circle at bottom right, rgba(255, 214, 150, 0.24), transparent 34%),
        linear-gradient(135deg, #07214a 0%, #0f4ea8 56%, #1d6fd0 100%);
      color: #fff;
      box-shadow: 0 28px 90px rgba(4, 17, 36, 0.4);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .raffle-screen-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 26px 0;
    }

    .raffle-screen-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #d8e8ff;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .raffle-screen-event {
      margin-top: 12px;
      font-size: clamp(1.6rem, 4vw, 3rem);
      line-height: 1.05;
      font-weight: 900;
      max-width: 760px;
    }

    .raffle-screen-close {
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      padding: 10px 16px;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .raffle-screen-body {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 26px;
      padding: 24px 26px 26px;
      align-items: stretch;
    }

    .raffle-screen-brand {
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.24);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 20px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .raffle-screen-brand-media {
      width: 100%;
      min-height: 250px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top, rgba(15, 78, 168, 0.08), transparent 54%),
        linear-gradient(180deg, #ffffff 0%, #f3f8ff 100%);
      border: 1px solid rgba(255, 255, 255, 0.4);
      display: grid;
      place-items: center;
      padding: 24px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 18px 36px rgba(5, 19, 40, 0.18);
    }

    .raffle-screen-brand-logo {
      width: min(300px, 100%);
      max-height: 210px;
      object-fit: contain;
      filter: drop-shadow(0 16px 24px rgba(4, 17, 36, 0.18));
    }

    .raffle-screen-brand-name {
      font-size: clamp(1.5rem, 2.6vw, 2.35rem);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 10px rgba(5, 17, 36, 0.2);
    }

    .raffle-screen-brand-copy {
      color: #d6e6ff;
      font-size: 1.06rem;
      line-height: 1.45;
      font-weight: 700;
      max-width: 300px;
    }

    .raffle-screen-winners {
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 28px 28px 22px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .raffle-screen-title {
      font-size: clamp(1.4rem, 2.8vw, 2.4rem);
      line-height: 1.05;
      font-weight: 900;
    }

    .raffle-screen-subtitle {
      color: #d6e6ff;
      font-size: 1rem;
      font-weight: 600;
    }

    .raffle-screen-list {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .raffle-screen-item {
      display: grid;
      gap: 4px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .raffle-screen-item-name {
      font-size: clamp(1.2rem, 2.6vw, 2rem);
      line-height: 1.06;
      font-weight: 900;
    }

    .raffle-screen-item-dni {
      color: #d6e6ff;
      font-size: clamp(1rem, 1.8vw, 1.26rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .raffle-winner {
      border: 1px solid #cfe0f4;
      border-radius: 10px;
      background: #ffffff;
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .raffle-winner h4,
    .raffle-list h4 {
      font-size: 0.88rem;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .raffle-row {
      font-size: 0.82rem;
      line-height: 1.2;
      color: #213750;
    }

    .raffle-list {
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #ffffff;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .raffle-list ul {
      max-height: 220px;
      overflow-y: auto;
      padding-left: 16px;
      margin: 0;
      display: grid;
      gap: 4px;
    }

    .raffle-list li {
      color: #213750;
      font-size: 0.82rem;
      line-height: 1.15;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th,
    td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #edf2f8;
      vertical-align: top;
      font-size: 0.94rem;
    }

    th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4e6482;
      background: #f8fbff;
    }

    td {
      color: #213750;
    }

    .attendance-col {
      text-align: center;
      width: 88px;
      white-space: nowrap;
    }

    .reconfirm-col {
      text-align: center;
      width: 128px;
      white-space: nowrap;
    }

    .attendance-checkbox {
      width: 16px;
      height: 16px;
      accent-color: #188645;
      cursor: pointer;
      vertical-align: middle;
    }

    .status {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .status.error {
      border-color: #f1b5af;
      background: #fdeceb;
      color: #8f241f;
    }

    .status.warning {
      border-color: #ebd7ac;
      background: #fff6df;
      color: var(--warn);
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .raffle-screen {
        padding: 14px;
      }

      .raffle-screen-panel {
        min-height: 0;
      }

      .raffle-screen-head {
        padding: 18px 18px 0;
      }

      .raffle-screen-body {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .raffle-screen-brand {
        padding: 20px 18px;
      }

      .raffle-screen-brand-media {
        min-height: 200px;
        padding: 18px;
      }

      .raffle-screen-winners {
        padding: 20px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div>
        <h1>Panel de inscripciones</h1>
        <div class="summary">
          <span class="pill">Total: <strong id="totalValue">0</strong></span>
          <span class="pill">Asistencias: <strong id="attendanceTotalValue">0</strong></span>
          <span class="pill">Reconfirmados: <strong id="reconfirmTotalValue">0</strong></span>
          <span id="updatedAt">Sin actualización</span>
        </div>
      </div>
      <div class="top-actions">
        <div class="view-switch" role="tablist" aria-label="Vista del panel">
          <button class="btn-view is-active" id="viewInscripcionesBtn" type="button">Inscripciones</button>
          <button class="btn-view" id="viewAsistenciaBtn" type="button">Asistencia Encuentros</button>
          <button class="btn-view" id="viewSorteosBtn" type="button">Sorteos</button>
          <button class="btn-view" id="viewCertificadosBtn" type="button">Certificado asistencias</button>
        </div>
        <button class="btn" id="refreshBtn" type="button">Actualizar</button>
        <form method="post" action="/api/admin">
          <input type="hidden" name="action" value="logout">
          <button class="btn" type="submit">Cerrar sesión</button>
        </form>
      </div>
    </header>

    <div class="status" id="status">Cargando datos...</div>
    <section class="events" id="eventsContainer"></section>
  </main>

  <section class="raffle-screen" id="raffleScreen" aria-hidden="true">
    <div class="raffle-screen-panel" role="dialog" aria-modal="true" aria-labelledby="raffleScreenEvent">
      <div class="raffle-screen-head">
        <div>
          <div class="raffle-screen-kicker">Resultado del sorteo</div>
          <h2 class="raffle-screen-event" id="raffleScreenEvent">Ganadores</h2>
        </div>
        <button class="raffle-screen-close" id="raffleScreenClose" type="button">Cerrar</button>
      </div>
      <div class="raffle-screen-body">
        <aside class="raffle-screen-brand">
          <div class="raffle-screen-brand-media">
            <img class="raffle-screen-brand-logo" id="raffleScreenBrandLogo" alt="">
          </div>
          <div class="raffle-screen-brand-name" id="raffleScreenBrandName">Marca</div>
          <p class="raffle-screen-brand-copy">Premio asignado a esta marca.</p>
        </aside>
        <section class="raffle-screen-winners">
          <h3 class="raffle-screen-title">Ganadores</h3>
          <p class="raffle-screen-subtitle" id="raffleScreenSubtitle">Personas sorteadas</p>
          <div class="raffle-screen-list" id="raffleScreenList"></div>
        </section>
      </div>
    </div>
  </section>

  <script>
    const statusBox = document.getElementById("status");
    const eventsContainer = document.getElementById("eventsContainer");
    const totalValue = document.getElementById("totalValue");
    const attendanceTotalValue = document.getElementById("attendanceTotalValue");

    let currentAdminRole = "admin";
    let currentEventos = [];
    const toggleInFlight = new Set();
    const certificateToggleInFlight = new Set();
    const raffleInFlight = new Set();
    const visibleRowsByEvent = new Map();
    const attendanceLookupByEvent = new Map();

    const raffleWinnerByEvent = new Map();
    const RAFFLE_BRANDS = [
      { key: "rheem", name: "Rheem", logo: "/Prueba_2/assets/empresas/36_rheem.png" },
      { key: "piazza", name: "Piazza", logo: "/Prueba_2/assets/empresas/12_piazza.png" },

      { key: "waterplast", name: "Waterplast", logo: "/Prueba_2/assets/empresas/04_waterplast.png" },
      { key: "rao", name: "RAO", logo: "/Prueba_2/assets/empresas/26_rao.png" },
      { key: "dinatecnica", name: "Dinatecnica", logo: "/Prueba_2/assets/empresas/27_dinatecnica.png" },
      { key: "btm_bombas", name: "BTM", logo: "/Prueba_2/assets/empresas/05_btm_bombas.png" }
    ];
    const RAFFLE_BRAND_BY_KEY = new Map(
      RAFFLE_BRANDS.map((brand) => [brand.key, brand])
    );

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeBrandKey(value) {
      return String(value ?? "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function getBrandInfo(value) {
      const key = normalizeBrandKey(value);
      return RAFFLE_BRAND_BY_KEY.get(key) || null;
    }

    function getBrandLabel(value) {
      const brand = getBrandInfo(value);
      return brand?.name || "Sin marca";
    }

    function getBrandLogo(value) {
      const brand = getBrandInfo(value);
      return brand?.logo || "";
    }

    function closeRaffleScreen() {
      raffleScreen.classList.remove("is-open");
      raffleScreen.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function openRaffleScreen({ eventName, brandKey, winners }) {
      const brandLabel = getBrandLabel(brandKey);
      const brandLogo = getBrandLogo(brandKey);
      const safeWinners = Array.isArray(winners) ? winners : [];

      raffleScreenEvent.textContent = eventName || "Ganadores";
      raffleScreenBrandName.textContent = brandLabel;
      raffleScreenSubtitle.textContent =
        safeWinners.length === 1
          ? "Persona ganadora del sorteo"
          : `${safeWinners.length} personas ganadoras del sorteo`;

      if (brandLogo) {
        raffleScreenBrandLogo.src = brandLogo;
        raffleScreenBrandLogo.alt = `Logo ${brandLabel}`;
        raffleScreenBrandLogo.style.display = "";
      } else {
        raffleScreenBrandLogo.removeAttribute("src");
        raffleScreenBrandLogo.alt = "";
        raffleScreenBrandLogo.style.display = "none";
      }

      raffleScreenList.innerHTML = safeWinners
        .map((winner) => `
          <article class="raffle-screen-item">
            <div class="raffle-screen-item-name">${escapeHtml(winner?.nombre_apellido || "-")}</div>
            <div class="raffle-screen-item-dni">DNI ${escapeHtml(winner?.dni || "-")}</div>
          </article>
        `)
        .join("");

      raffleScreen.classList.add("is-open");
      raffleScreen.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return new Intl.DateTimeFormat("es-AR", {
        dateStyle: "short",
        timeStyle: "short"
      }).format(date);
    }

    function setStatusMessage(message, mode = "ok") {
      statusBox.classList.remove("error", "warning");
      if (mode === "error") {
        statusBox.classList.add("error");
      } else if (mode === "warning") {
        statusBox.classList.add("warning");
      }
      statusBox.textContent = message;
    }

    function countAttendance(eventos) {
      if (!Array.isArray(eventos)) return 0;
      return eventos.reduce((total, eventItem) => {
        const rows = Array.isArray(eventItem?.inscripciones) ? eventItem.inscripciones : [];
        const eventAttendance = rows.reduce(
          (sum, row) => sum + (row?.asistio === true ? 1 : 0),
          0
        );
        return total + eventAttendance;
      }, 0);
    }

    function countReconfirm(eventos) {
      if (!Array.isArray(eventos)) return 0;
      return eventos.reduce((total, eventItem) => {
        const rows = Array.isArray(eventItem?.inscripciones) ? eventItem.inscripciones : [];
        const eventReconfirm = rows.reduce(
          (sum, row) => sum + (row?.reconfirmado === true ? 1 : 0),
          0
        );
        return total + eventReconfirm;
      }, 0);
    }

    function renderViewButtons() {
      const asistenciaOnly = currentAdminRole === "asistencia";
      viewInscripcionesBtn.style.display = asistenciaOnly ? "none" : "inline-flex";
      viewSorteosBtn.style.display = asistenciaOnly ? "none" : "inline-flex";
      viewCertificadosBtn.style.display = asistenciaOnly ? "none" : "inline-flex";
      if (asistenciaOnly && currentPanelView !== PANEL_VIEW_ASISTENCIA) {
        currentPanelView = PANEL_VIEW_ASISTENCIA;
      }
      viewInscripcionesBtn.classList.toggle("is-active", currentPanelView === PANEL_VIEW_INSCRIPCIONES);
      viewAsistenciaBtn.classList.toggle("is-active", currentPanelView === PANEL_VIEW_ASISTENCIA);
      viewSorteosBtn.classList.toggle("is-active", currentPanelView === PANEL_VIEW_SORTEOS);
      viewCertificadosBtn.classList.toggle("is-active", currentPanelView === PANEL_VIEW_CERTIFICADOS);
      viewInscripcionesBtn.setAttribute(
        "aria-pressed",
        currentPanelView === PANEL_VIEW_INSCRIPCIONES ? "true" : "false"
      );
      viewAsistenciaBtn.setAttribute(
        "aria-pressed",
        currentPanelView === PANEL_VIEW_ASISTENCIA ? "true" : "false"
      );
      viewSorteosBtn.setAttribute(
        "aria-pressed",
        currentPanelView === PANEL_VIEW_SORTEOS ? "true" : "false"
      );
      viewCertificadosBtn.setAttribute(
        "aria-pressed",
        currentPanelView === PANEL_VIEW_CERTIFICADOS ? "true" : "false"
      );
    }

    function setPanelView(nextView) {
      if (currentAdminRole === "asistencia" && nextView !== PANEL_VIEW_ASISTENCIA) {
        nextView = PANEL_VIEW_ASISTENCIA;
      }
      if (
        nextView !== PANEL_VIEW_INSCRIPCIONES &&
        nextView !== PANEL_VIEW_ASISTENCIA &&
        nextView !== PANEL_VIEW_SORTEOS &&
        nextView !== PANEL_VIEW_CERTIFICADOS
      ) {
        return;
      }
      if (currentPanelView === nextView) return;
      currentPanelView = nextView;
      renderViewButtons();
      renderEvents(currentEventos);
    }

    function isEventActive(item) {
      return item?.activo !== false;
    }

    function isCertificateVisible(item) {
      return item?.certificado_activo !== false;
    }

    function getEventKey(item, index) {
      return `${String(item?.evento || "evento").toLowerCase()}::${index}`;
    }

    function getVisibleRows(item, index, totalRows) {
      const key = getEventKey(item, index);
      const savedValue = Number.parseInt(String(visibleRowsByEvent.get(key) ?? ""), 10);
      const baseValue = Number.isFinite(savedValue) ? savedValue : DEFAULT_VISIBLE_ROWS;
      const nextValue = Math.max(0, Math.min(baseValue, totalRows));
      visibleRowsByEvent.set(key, nextValue);
      return nextValue;
    }

    function setVisibleRows(item, index, nextValue) {
      const key = getEventKey(item, index);
      const totalRows = Array.isArray(item?.inscripciones) ? item.inscripciones.length : 0;
      const clamped = Math.max(0, Math.min(Number(nextValue) || 0, totalRows));
      visibleRowsByEvent.set(key, clamped);
    }

    function getAttendanceLookup(item, index) {
      const key = getEventKey(item, index);
      if (!attendanceLookupByEvent.has(key)) {
        attendanceLookupByEvent.set(key, {
          searched: false,
          numero: "",
          row: null,
          error: ""
        });
      }
      return attendanceLookupByEvent.get(key);
    }

    function getRaffleDrawCount(item, index, eligibleCount) {
      const key = getEventKey(item, index);
      const fallback = 1;
      const maxValue = Math.max(eligibleCount || 0, 1);
      const savedValue = Number.parseInt(String(raffleCountByEvent.get(key) ?? ""), 10);
      const nextValue = Number.isFinite(savedValue)
        ? Math.max(1, Math.min(savedValue, maxValue))
        : Math.min(fallback, maxValue);
      raffleCountByEvent.set(key, nextValue);
      return nextValue;
    }

    function setRaffleDrawCount(item, index, nextValue, eligibleCount) {
      const key = getEventKey(item, index);
      const maxValue = Math.max(eligibleCount || 0, 1);
      const parsedValue = Number.parseInt(String(nextValue ?? ""), 10);
      const normalizedValue = Number.isFinite(parsedValue)
        ? Math.max(1, Math.min(parsedValue, maxValue))
        : 1;
      raffleCountByEvent.set(key, normalizedValue);
      return normalizedValue;
    }

    function getRaffleBrandState(item, index) {
      const key = getEventKey(item, index);
      return normalizeBrandKey(raffleBrandByEvent.get(key));
    }

    function setRaffleBrandState(item, index, brandKey) {
      const key = getEventKey(item, index);
      const normalizedBrandKey = normalizeBrandKey(brandKey);
      if (!normalizedBrandKey) {
        raffleBrandByEvent.delete(key);
        return "";
      }
      raffleBrandByEvent.set(key, normalizedBrandKey);
      return normalizedBrandKey;
    }

    function normalizeDniValue(value) {
      return String(value ?? "").replace(/\D+/g, "").trim();
    }

    function findInscriptoByDni(eventItem, dni) {
      const normalizedDni = normalizeDniValue(dni);
      if (!normalizedDni) return null;
      const rows = Array.isArray(eventItem?.inscripciones) ? eventItem.inscripciones : [];
      return rows.find((entry) => normalizeDniValue(entry.dni) === normalizedDni) || null;
    }

    function searchAttendanceByDni(item, index, rawDni) {
      const state = getAttendanceLookup(item, index);
      const cleaned = normalizeDniValue(rawDni);

      state.searched = true;
      state.numero = cleaned;
      state.row = null;
      state.error = "";

      if (!cleaned) {
        state.error = "Ingresa un DNI valido.";
        return;
      }

      const rows = Array.isArray(item?.inscripciones) ? item.inscripciones : [];
      const found = rows.find((entry) => {
        const rowDni = normalizeDniValue(entry.dni);
        return rowDni === cleaned;
      }) || null;

      if (!found) {
        state.error = "No se encontro una persona con ese DNI en este encuentro.";
        return;
      }

      state.row = found;
      state.numero = cleaned;
    }

    function updateAttendanceStateLocally(eventItem, dni, asistio) {
      const normalizedDni = normalizeDniValue(dni);
      const rows = Array.isArray(eventItem?.inscripciones) ? eventItem.inscripciones : [];
      for (const row of rows) {
        if (normalizeDniValue(row?.dni) === normalizedDni) {
          row.asistio = asistio === true;
        }
      }
    }

    function getUniqueRowsByDni(rows) {
      const list = Array.isArray(rows) ? rows : [];
      const uniqueRows = [];
      const seen = new Set();

      for (const row of list) {
        const normalizedDni = normalizeDniValue(row?.dni);
        if (!normalizedDni || seen.has(normalizedDni)) continue;
        seen.add(normalizedDni);
        uniqueRows.push(row);
      }

      return uniqueRows;
    }

    async function persistAttendanceState(eventItem, dni, asistio) {
      const response = await fetch("/api/admin-inscripciones", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({
          action: "set_attendance",
          evento: eventItem?.evento || "",
          dni,
          asistio
        })
      });

      if (response.status === 401) {
        window.location.href = ADMIN_LOGIN_URL;
        return { ok: false, redirected: true };
      }

      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) {
        throw new Error(data.error || "No se pudo guardar la asistencia.");
      }

      return {
        ok: true,
        asistio: data.asistio === true
      };
    }

    function buildAttendanceResultHtml(item, index) {
      const rows = Array.isArray(item?.inscripciones) ? item.inscripciones : [];
      if (rows.length === 0) {
        return `<p class="attendance-hint">No hay inscriptos para buscar en este encuentro.</p>`;
      }

      const state = getAttendanceLookup(item, index);

      if (!state.searched) {
        return `<p class="attendance-hint">Ingresa un DNI para ver los datos.</p>`;
      }

      if (state.error) {
        return `<p class="attendance-error">${escapeHtml(state.error)}</p>`;
      }

      if (!state.row) {
        return `<p class="attendance-hint">No se encontro informacion del DNI buscado.</p>`;
      }

      const latestRow = findInscriptoByDni(item, state.row?.dni);
      const row = latestRow || state.row;
      const confirmed = row?.asistio === true;

      return `
        <div class="attendance-result">
          <p class="attendance-row"><strong>DNI:</strong> ${escapeHtml(row.dni || "-")}</p>
          <p class="attendance-row"><strong>Nombre y apellido:</strong> ${escapeHtml(row.nombre_apellido || "-")}</p>
          <p class="attendance-row"><strong>Mail:</strong> ${escapeHtml(row.mail || "-")}</p>
          <p class="attendance-row"><strong>Localidad:</strong> ${escapeHtml(row.localidad || "-")}</p>
          <p class="attendance-row"><strong>Empresa:</strong> ${escapeHtml(row.expositor_info || "-")}</p>
          <p class="attendance-row"><strong>Reconfirmacion:</strong> ${row?.reconfirmado === true ? "Si" : "No"}</p>
          <div class="attendance-check-wrap">
            <button
              class="btn-attendance-check ${confirmed ? "is-done" : ""}"
              type="button"
              data-attendance-confirm="${index}"
              data-attendance-dni="${escapeHtml(row.dni ?? "")}"
            >
              ${confirmed ? "&#10003; Asistencia marcada" : "&#10003;"}
            </button>
          </div>
        </div>
      `;
    }

    function getEligibleRaffleRows(eventItem) {
      const rows = getUniqueRowsByDni(eventItem?.inscripciones);
      return rows.filter(
        (row) => row?.asistio === true && row?.sorteado !== true && normalizeDniValue(row?.dni)
      );
    }

    function getRaffleWinners(eventItem) {
      const rows = getUniqueRowsByDni(eventItem?.inscripciones);
      return rows.filter(
        (row) => row?.sorteado === true && normalizeDniValue(row?.dni)
      );
    }

    function getRaffleState(item, index) {
      const key = getEventKey(item, index);
      const saved = raffleWinnerByEvent.get(key);
      return Array.isArray(saved) ? saved : [];
    }

    function setRaffleState(item, index, rows) {
      const key = getEventKey(item, index);
      if (!Array.isArray(rows) || rows.length === 0) {
        raffleWinnerByEvent.delete(key);
        return;
      }
      raffleWinnerByEvent.set(key, rows);
    }

    function updateRaffleStateLocally(eventItem, dni, sorteado, brandKey) {
      const normalizedDni = normalizeDniValue(dni);
      const normalizedBrandKey = normalizeBrandKey(brandKey);
      const rows = Array.isArray(eventItem?.inscripciones) ? eventItem.inscripciones : [];
      let matchedRow = null;

      for (const row of rows) {
        if (normalizeDniValue(row?.dni) !== normalizedDni) continue;
        row.sorteado = sorteado === true;
        if (normalizedBrandKey) {
          row.marca_sorteo = normalizedBrandKey;
        }
        if (!matchedRow) {
          matchedRow = row;
        }
      }

      return matchedRow;
    }

    function groupRaffleWinnersByBrand(rows) {
      const groups = new Map();
      for (const row of Array.isArray(rows) ? rows : []) {
        const brandKey = normalizeBrandKey(row?.marca_sorteo) || "sin_marca";
        if (!groups.has(brandKey)) {
          groups.set(brandKey, []);
        }
        groups.get(brandKey).push(row);
      }
      return [...groups.entries()].map(([brandKey, winners]) => ({
        brandKey,
        brandLabel: getBrandLabel(brandKey),
        brandLogo: getBrandLogo(brandKey),
        winners
      }));
    }

    function buildRaffleBrandGroupsHtml(rows) {
      const groups = groupRaffleWinnersByBrand(rows);
      return groups.map((group) => `
        <div class="raffle-brand-group">
          ${
            group.brandLogo
              ? `<img class="raffle-brand-logo" src="${escapeHtml(group.brandLogo)}" alt="Logo ${escapeHtml(group.brandLabel)}">`
              : ""
          }
          <div class="raffle-brand-info">
            <div class="raffle-brand-name">${escapeHtml(group.brandLabel)}</div>
            <ul class="raffle-brand-names">
              ${group.winners.map((winner) => `
                <li class="raffle-row">
                  ${escapeHtml(winner.nombre_apellido || "-")} - DNI ${escapeHtml(winner.dni || "-")}
                </li>
              `).join("")}
            </ul>
          </div>
        </div>
      `).join("");
    }

    async function drawRaffleWinner(eventItem, cantidad, marca) {
      const response = await fetch("/api/admin-inscripciones", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({
          action: "draw_raffle",
          evento: eventItem?.evento || "",
          cantidad,
          marca
        })
      });

      if (response.status === 401) {
        window.location.href = ADMIN_LOGIN_URL;
        return { ok: false, redirected: true };
      }

      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) {
        throw new Error(data.error || "No se pudo realizar el sorteo.");
      }

      return data;
    }

    function buildRaffleSectionHtml(item, index) {
      const rows = Array.isArray(item?.inscripciones) ? item.inscripciones : [];
      const eligibleRows = getEligibleRaffleRows(item);
      const winnerRows = getRaffleWinners(item);
      const lastWinners = getRaffleState(item, index);
      const isDrawing = raffleInFlight.has(index);
      const drawCount = getRaffleDrawCount(item, index, eligibleRows.length);
      const selectedBrand = getRaffleBrandState(item, index);

      if (rows.length === 0) {
        return `
          <section class="raffle-box">
            <h3 class="raffle-title">Sorteos</h3>
            <p class="raffle-hint">No hay inscriptos en este encuentro para participar del sorteo.</p>
          </section>
        `;
      }

      return `
        <section class="raffle-box">
          <h3 class="raffle-title">Sorteos</h3>
          <p class="raffle-hint">
            Participan solo los inscriptos con asistencia confirmada. Cada DNI puede salir una sola vez por encuentro.
          </p>
          <div class="raffle-actions">
            <span class="counter counter-attendance">${eligibleRows.length} disponibles</span>
            <span class="counter counter-attendance">${winnerRows.length} sorteados</span>
            <label class="raffle-brand-wrap">
              <span class="raffle-brand-label">Marca</span>
              <select
                class="raffle-brand-select"
                data-raffle-brand-select="${index}"
                ${isDrawing ? "disabled" : ""}
              >
                <option value="">Elegir marca</option>
                ${RAFFLE_BRANDS.map((brand) => `
                  <option value="${escapeHtml(brand.key)}" ${brand.key === selectedBrand ? "selected" : ""}>
                    ${escapeHtml(brand.name)}
                  </option>
                `).join("")}
              </select>
            </label>
            <label class="raffle-count-wrap">
              <span class="raffle-count-label">Cantidad a sortear</span>
              <input
                class="raffle-count-input"
                type="number"
                min="1"
                max="${Math.max(eligibleRows.length, 1)}"
                step="1"
                value="${drawCount}"
                data-raffle-count-input="${index}"
                ${eligibleRows.length === 0 || isDrawing ? "disabled" : ""}
              />
            </label>
            <button
              class="btn-event"
              type="button"
              data-draw-raffle="${index}"
              ${eligibleRows.length === 0 || isDrawing ? "disabled" : ""}
            >
              ${isDrawing ? "Sorteando..." : "Sortear"}
            </button>
          </div>
          ${
            lastWinners.length > 0
              ? `
                <div class="raffle-winner">
                  <h4>${lastWinners.length === 1 ? "Ultimo ganador sorteado" : "Ultimos ganadores sorteados"}</h4>
                  ${buildRaffleBrandGroupsHtml(lastWinners)}
                </div>
              `
              : ""
          }
          <div class="raffle-list">
            <h4>Ganadores ya sorteados</h4>
            ${
              winnerRows.length > 0
                ? buildRaffleBrandGroupsHtml(winnerRows)
                : `<p class="raffle-hint">Todavia no se sorteo ningun ganador en este encuentro.</p>`
            }
          </div>
        </section>

    function sanitizeFileName(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "evento";
    }

    const ORIGEN_LABELS = {
      facebook: "Grupo de Facebook",
      grupo_whatsapp: "Grupo de WhatsApp",
      instagram: "Instagram de Plomeros",
      casa_sanitarios: "Casa de Sanitarios",
      centro_formacion: "Centro de Formacion"
    };

    function normalizeSummaryLabel(value, fallback = "Sin dato") {
      const text = String(value ?? "").trim();
      return text || fallback;
    }

    function titleizeKey(value) {
      const raw = String(value ?? "").trim().toLowerCase();
      if (!raw) return "Sin dato";
      if (raw === "caba") return "CABA";
      return raw
        .split("_")
        .map((part) => part ? part.charAt(0).toUpperCase() + part.slice(1) : "")
        .join(" ");
    }

    function normalizeAsociadoLabel(value) {
      const normalized = String(value ?? "").trim().toLowerCase();
      if (normalized === "si") return "Si";
      if (normalized === "no") return "No";
      return "Sin dato";
    }

    function normalizeOrigenLabel(value) {
      const normalized = String(value ?? "").trim().toLowerCase();
      return ORIGEN_LABELS[normalized] || normalizeSummaryLabel(value);
    }

    function getProfesionSummaryValues(row) {
      const source = String(row?.profesion_label || row?.profesion || "");
      const values = source
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean);

      return values.length > 0 ? values : ["Sin dato"];
    }

    function buildSummaryEntries(rows, getValues) {
      const map = new Map();

      for (const row of Array.isArray(rows) ? rows : []) {
        const nextValues = getValues(row);
        const values = Array.isArray(nextValues) ? nextValues : [nextValues];

        for (const value of values) {
          const label = normalizeSummaryLabel(value);
          map.set(label, (map.get(label) || 0) + 1);
        }
      }

      return [...map.entries()].sort((a, b) =>
        b[1] - a[1] || a[0].localeCompare(b[0], "es")
      );
    }

    function formatSummaryPercent(count, total) {
      if (!Number.isFinite(count) || !Number.isFinite(total) || total <= 0) {
        return "0%";
      }

      const percent = (count / total) * 100;
      const rounded = Number.isInteger(percent) ? percent.toFixed(0) : percent.toFixed(1);
      return `${rounded.replace(".", ",")}%`;
    }

    function buildSummaryBar(count, total, color) {
      const percent = total > 0 ? Math.max(0, Math.min(100, Math.round((count / total) * 100))) : 0;

      return `
        <table cellpadding="0" cellspacing="0" style="width:180px;border-collapse:collapse;">
          <tr>
            <td style="width:${percent}%;height:12px;background:${color};"></td>
            <td style="width:${100 - percent}%;height:12px;background:#edf3fb;"></td>
          </tr>
        </table>
      `;
    }

    function buildSummaryNarrative(entries, total) {
      if (!Array.isArray(entries) || entries.length === 0 || total <= 0) {
        return "Sin datos para analizar en esta categoria.";
      }

      const [first, second] = entries;
      const [firstLabel, firstCount] = first;
      const firstPercent = formatSummaryPercent(firstCount, total);

      if (firstCount === total) {
        return `Todos los registros corresponden a ${firstLabel} (${firstCount} - ${firstPercent}).`;
      }

      let text = `Predomina ${firstLabel} con ${firstCount} registros (${firstPercent}).`;

      if (second) {
        const [secondLabel, secondCount] = second;
        const secondPercent = formatSummaryPercent(secondCount, total);
        text += ` Le sigue ${secondLabel} con ${secondCount} registros (${secondPercent}).`;
      }

      return text;
    }

    function buildSummarySection(title, entries, total, color) {
      const safeTitle = escapeHtml(title);
      const narrative = escapeHtml(buildSummaryNarrative(entries, total));

      return `
        <table border="1" style="margin:0 0 18px;border-collapse:collapse;">
          <thead>
            <tr>
              <th colspan="4" style="background:${color};color:#ffffff;">${safeTitle}</th>
            </tr>
            <tr>
              <th colspan="4" style="background:#f8fbff;color:#243b5a;text-align:left;font-weight:600;">${narrative}</th>
            </tr>
            <tr>
              <th>Categoria</th>
              <th>Cantidad</th>
              <th>Porcentaje</th>
              <th>Grafico</th>
            </tr>
          </thead>
          <tbody>
            ${
              entries.length > 0
                ? entries
                  .map(([label, count]) => `
                    <tr>
                      <td>${escapeHtml(label)}</td>
                      <td>${count}</td>
                      <td>${formatSummaryPercent(count, total)}</td>
                      <td>${buildSummaryBar(count, total, color)}</td>
                    </tr>
                  `)
                  .join("")
                : `
                  <tr>
                    <td colspan="4">Sin datos.</td>
                  </tr>
                `
            }
          </tbody>
        </table>
      `;
    }

    function buildSummaryExcelHtml(eventName, rows) {
      const list = Array.isArray(rows) ? rows : [];
      const total = list.length;
      const totalAsistencias = list.reduce((sum, row) => sum + (row?.asistio === true ? 1 : 0), 0);
      const totalReconfirmados = list.reduce((sum, row) => sum + (row?.reconfirmado === true ? 1 : 0), 0);
      const totalAsociados = list.reduce(
        (sum, row) => sum + (normalizeAsociadoLabel(row?.asociado) === "Si" ? 1 : 0),
        0
      );

      const profesiones = buildSummaryEntries(list, (row) => getProfesionSummaryValues(row));
      const asociados = buildSummaryEntries(list, (row) => normalizeAsociadoLabel(row?.asociado));
      const provincias = buildSummaryEntries(list, (row) => titleizeKey(row?.provincia));
      const origenes = buildSummaryEntries(list, (row) => normalizeOrigenLabel(row?.origen));
      const asistencias = buildSummaryEntries(list, (row) => row?.asistio === true ? "Si" : "No");
      const reconfirmaciones = buildSummaryEntries(list, (row) => row?.reconfirmado === true ? "Si" : "No");
      const safeEventName = escapeHtml(eventName || "Evento");
      const generatedAt = escapeHtml(formatDate(new Date().toISOString()));

      return `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
          <head>
            <meta charset="UTF-8">
          </head>
          <body>
            <table border="1" style="margin:0 0 18px;border-collapse:collapse;">
              <thead>
                <tr>
                  <th colspan="2">Resumen con graficos - Evento ${safeEventName}</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>Total inscriptos</td><td>${total}</td></tr>
                <tr><td>Total asistencias</td><td>${totalAsistencias}</td></tr>
                <tr><td>Total reconfirmados</td><td>${totalReconfirmados}</td></tr>
                <tr><td>Total asociados</td><td>${totalAsociados}</td></tr>
                <tr><td>Generado</td><td>${generatedAt}</td></tr>
              </tbody>
            </table>
            ${buildSummarySection("Profesiones", profesiones, total, "#0f4ea8")}
            ${buildSummarySection("Asociados", asociados, total, "#1f7a45")}
            ${buildSummarySection("Provincias", provincias, total, "#7d4f00")}
            ${buildSummarySection("Origen", origenes, total, "#6b49a6")}
            ${buildSummarySection("Asistencia", asistencias, total, "#0f7a45")}
            ${buildSummarySection("Reconfirmacion", reconfirmaciones, total, "#b05c00")}
          </body>
        </html>
      `;
    }

    function downloadEventExcel(eventName, rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        return;
      }

      const safeEventName = escapeHtml(eventName || "Evento");
      const html = `

          <head>
            <meta charset="UTF-8">

    async function loadData() {
      setStatusMessage("Actualizando datos...");
      refreshBtn.disabled = true;

      try {
        const response = await fetch("/api/admin-inscripciones", {
          method: "GET",
          headers: { "Accept": "application/json" }
        });

        if (response.status === 401) {
          window.location.href = ADMIN_LOGIN_URL;
          return;
        }

        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar el panel.");
        }

        currentAdminRole = String(data.role || "admin").toLowerCase() === "asistencia"
          ? "asistencia"
          : "admin";
        if (currentAdminRole === "asistencia") {
          currentPanelView = PANEL_VIEW_ASISTENCIA;
        }
        renderViewButtons();

        totalValue.textContent = String(data.total ?? 0);
        updatedAt.textContent = data.generated_at
          ? `Actualizado: ${formatDate(data.generated_at)}`
          : "Actualizado";

        renderEvents(data.eventos || []);
        const warnings = [
          String(data.status_warning || "").trim(),
          String(data.certificate_status_warning || "").trim()
        ].filter(Boolean);

        if (warnings.length > 0) {
          setStatusMessage(warnings.join(" | "), "warning");
        } else {
          setStatusMessage("Datos cargados correctamente.");
        }
      } catch (error) {
        setStatusMessage(`Error: ${error.message}`, "error");
      } finally {
        refreshBtn.disabled = false;
      }
    }

    async function toggleEvent(index) {
      if (!Number.isInteger(index) || toggleInFlight.has(index)) return;

      const selected = currentEventos[index];
      if (!selected || !selected.evento) return;

      const nextActive = !isEventActive(selected);
      toggleInFlight.add(index);
      renderEvents(currentEventos);

      try {
        const response = await fetch("/api/admin-inscripciones", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            evento: selected.evento,
            activo: nextActive
          })
        });

        if (response.status === 401) {
          window.location.href = ADMIN_LOGIN_URL;
          return;
        }

        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.ok) {
          const sqlHint = typeof data.sql === "string" && data.sql ? ` SQL: ${data.sql}` : "";
          throw new Error((data.error || "No se pudo actualizar el estado.") + sqlHint);
        }

        selected.activo = data.activo !== false;
        renderEvents(currentEventos);
        setStatusMessage(
          `Evento ${selected.evento}: ${selected.activo ? "activo" : "inactivo"}.`
        );
      } catch (error) {
        setStatusMessage(`Error: ${error.message}`, "error");
      } finally {
        toggleInFlight.delete(index);
        renderEvents(currentEventos);
      }
    }

    async function toggleCertificate(index) {
      if (!Number.isInteger(index) || certificateToggleInFlight.has(index)) return;

      const selected = currentEventos[index];
      if (!selected || !selected.evento) return;

      const nextVisible = !isCertificateVisible(selected);
      certificateToggleInFlight.add(index);
      renderEvents(currentEventos);

      try {
        const response = await fetch("/api/admin-inscripciones", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            action: "set_certificado_visible",
            evento: selected.evento,
            certificado_activo: nextVisible
          })
        });

        if (response.status === 401) {
          window.location.href = ADMIN_LOGIN_URL;
          return;
        }

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          const sqlHint = typeof data.sql === "string" && data.sql ? ` SQL: ${data.sql}` : "";
          throw new Error((data.error || "No se pudo actualizar certificados.") + sqlHint);
        }

        selected.certificado_activo = data.certificado_activo !== false;
        renderEvents(currentEventos);
        setStatusMessage(
          `Certificados de ${selected.evento}: ${selected.certificado_activo ? "visibles" : "ocultos"}.`
        );
      } catch (error) {
        setStatusMessage(`Error: ${error.message}`, "error");
      } finally {
        certificateToggleInFlight.delete(index);
        renderEvents(currentEventos);
      }
    }

    eventsContainer.addEventListener("click", async (event) => {
      const toggleButton = event.target.closest("[data-toggle-event]");
      if (toggleButton) {
        const toggleIndex = Number.parseInt(toggleButton.getAttribute("data-toggle-event"), 10);
        await toggleEvent(toggleIndex);
        return;
      }

      const toggleCertificateButton = event.target.closest("[data-toggle-certificate]");
      if (toggleCertificateButton) {
        const toggleCertificateIndex = Number.parseInt(
          toggleCertificateButton.getAttribute("data-toggle-certificate"),
          10
        );
        await toggleCertificate(toggleCertificateIndex);
        return;
      }

      const attendanceSearchButton = event.target.closest("[data-attendance-search]");
      if (attendanceSearchButton) {
        const searchIndex = Number.parseInt(
          attendanceSearchButton.getAttribute("data-attendance-search"),
          10
        );
        if (!Number.isInteger(searchIndex)) return;
        const selected = currentEventos[searchIndex];
        if (!selected) return;

        const input = eventsContainer.querySelector(`[data-attendance-input="${searchIndex}"]`);
        const inputValue = input ? input.value : "";
        searchAttendanceByDni(selected, searchIndex, inputValue);
        renderEvents(currentEventos);
        return;
      }

      const attendanceConfirmButton = event.target.closest("[data-attendance-confirm]");
      if (attendanceConfirmButton) {
        const confirmIndex = Number.parseInt(
          attendanceConfirmButton.getAttribute("data-attendance-confirm"),
          10
        );
        if (!Number.isInteger(confirmIndex)) return;
        const selected = currentEventos[confirmIndex];
        if (!selected) return;
        const dniValue = attendanceConfirmButton.getAttribute("data-attendance-dni");
        const normalizedDni = normalizeDniValue(dniValue);
        if (!normalizedDni) return;

        try {
          attendanceConfirmButton.disabled = true;
          const saveResult = await persistAttendanceState(selected, normalizedDni, true);
          if (saveResult.redirected) return;
          updateAttendanceStateLocally(selected, normalizedDni, saveResult.asistio);
          setStatusMessage("Asistencia guardada correctamente.");
        } catch (error) {
          setStatusMessage(`Error: ${error.message}`, "error");
        } finally {
          renderEvents(currentEventos);
        }
        return;
      }

      const showMoreButton = event.target.closest("[data-show-more]");
      if (showMoreButton) {
        const showMoreIndex = Number.parseInt(showMoreButton.getAttribute("data-show-more"), 10);
        if (!Number.isInteger(showMoreIndex)) return;
        const selected = currentEventos[showMoreIndex];
        if (!selected) return;
        const totalRows = Array.isArray(selected.inscripciones) ? selected.inscripciones.length : 0;
        setVisibleRows(selected, showMoreIndex, totalRows);
        renderEvents(currentEventos);
        return;
      }

      const showLessButton = event.target.closest("[data-show-less]");
      if (showLessButton) {
        const showLessIndex = Number.parseInt(showLessButton.getAttribute("data-show-less"), 10);
        if (!Number.isInteger(showLessIndex)) return;
        const selected = currentEventos[showLessIndex];
        if (!selected) return;
        setVisibleRows(selected, showLessIndex, DEFAULT_VISIBLE_ROWS);
        renderEvents(currentEventos);
        return;
      }

      const downloadButton = event.target.closest("[data-download-event]");
      if (downloadButton) {
        const index = Number.parseInt(downloadButton.getAttribute("data-download-event"), 10);
        if (!Number.isInteger(index)) return;

        const selected = currentEventos[index];
        if (!selected) return;

        downloadEventExcel(selected.evento || "evento", selected.inscripciones || []);
        return;
      }

      const drawRaffleButton = event.target.closest("[data-draw-raffle]");
      if (drawRaffleButton) {
        const drawIndex = Number.parseInt(drawRaffleButton.getAttribute("data-draw-raffle"), 10);
        if (!Number.isInteger(drawIndex) || raffleInFlight.has(drawIndex)) return;

        const selected = currentEventos[drawIndex];
        if (!selected) return;
        const eligibleRows = getEligibleRaffleRows(selected);
        const drawCount = getRaffleDrawCount(selected, drawIndex, eligibleRows.length);
        const selectedBrand = getRaffleBrandState(selected, drawIndex);

        if (!selectedBrand) {
          setStatusMessage("Selecciona una marca antes de hacer el sorteo.", "error");
          return;
        }

        raffleInFlight.add(drawIndex);
        renderEvents(currentEventos);

        try {
          const result = await drawRaffleWinner(selected, drawCount, selectedBrand);
          if (result.redirected) return;

          const responseWinners = Array.isArray(result?.ganadores)
            ? result.ganadores
            : (result?.ganador ? [result.ganador] : []);

          const localWinners = responseWinners
            .map((winner) =>
              updateRaffleStateLocally(
                selected,
                winner?.dni,
                true,
                winner?.marca_sorteo || selectedBrand
              ) || winner
            )
            .filter(Boolean);

          setRaffleState(selected, drawIndex, localWinners);

          const winnerNames = localWinners
            .map((winner) => winner?.nombre_apellido || "Ganador sin nombre")
            .filter(Boolean);
          const namesPreview = winnerNames.slice(0, 3).join(", ");
          const extraCount = Math.max(winnerNames.length - 3, 0);
          const namesText = extraCount > 0
            ? `${namesPreview} y ${extraCount} mas`
            : namesPreview;
          const brandLabel = getBrandLabel(selectedBrand);

          openRaffleScreen({
            eventName: selected.evento,
            brandKey: selectedBrand,
            winners: localWinners
          });

          setStatusMessage(
            `Sorteo realizado en ${selected.evento} para ${brandLabel}: ${winnerNames.length} ganador${winnerNames.length === 1 ? "" : "es"}${namesText ? ` (${namesText})` : ""}.`
          );
        } catch (error) {
          setStatusMessage(`Error: ${error.message}`, "error");
        } finally {
          raffleInFlight.delete(drawIndex);
          renderEvents(currentEventos);
        }
        return;
      }

      const downloadSummaryButton = event.target.closest("[data-download-summary-event]");
      if (!downloadSummaryButton) return;

      const summaryIndex = Number.parseInt(
        downloadSummaryButton.getAttribute("data-download-summary-event"),
        10
      );
      if (!Number.isInteger(summaryIndex)) return;

      const selected = currentEventos[summaryIndex];
      if (!selected) return;

      downloadEventSummaryExcel(selected.evento || "evento", selected.inscripciones || []);
    });

    eventsContainer.addEventListener("change", async (event) => {
      const raffleBrandSelect = event.target.closest("[data-raffle-brand-select]");
      if (raffleBrandSelect) {
        const raffleIndex = Number.parseInt(
          raffleBrandSelect.getAttribute("data-raffle-brand-select"),
          10
        );
        if (!Number.isInteger(raffleIndex)) return;

        const selected = currentEventos[raffleIndex];
        if (!selected) return;

        setRaffleBrandState(selected, raffleIndex, raffleBrandSelect.value);
        return;
      }

      const raffleCountInput = event.target.closest("[data-raffle-count-input]");
      if (raffleCountInput) {
        const raffleIndex = Number.parseInt(
          raffleCountInput.getAttribute("data-raffle-count-input"),
          10
        );
        if (!Number.isInteger(raffleIndex)) return;

        const selected = currentEventos[raffleIndex];
        if (!selected) return;

        const eligibleRows = getEligibleRaffleRows(selected);
        const nextValue = setRaffleDrawCount(
          selected,
          raffleIndex,
          raffleCountInput.value,
          eligibleRows.length
        );
        raffleCountInput.value = String(nextValue);
        return;
      }

      const attendanceRowCheckbox = event.target.closest("[data-attendance-row-toggle]");
      if (!attendanceRowCheckbox) return;

      const rowIndex = Number.parseInt(
        attendanceRowCheckbox.getAttribute("data-attendance-row-toggle"),
        10
      );
      if (!Number.isInteger(rowIndex)) return;

      const selected = currentEventos[rowIndex];
      if (!selected) return;

      const dniValue = attendanceRowCheckbox.getAttribute("data-attendance-dni");
      const normalizedDni = normalizeDniValue(dniValue);
      if (!normalizedDni) return;

      try {
        attendanceRowCheckbox.disabled = true;
        const nextAsistio = Boolean(attendanceRowCheckbox.checked);
        const saveResult = await persistAttendanceState(selected, normalizedDni, nextAsistio);
        if (saveResult.redirected) return;
        updateAttendanceStateLocally(selected, normalizedDni, saveResult.asistio);
        setStatusMessage("Asistencia guardada correctamente.");
      } catch (error) {
        setStatusMessage(`Error: ${error.message}`, "error");
      } finally {
        renderEvents(currentEventos);
      }
    });

    viewInscripcionesBtn.addEventListener("click", () => {
      setPanelView(PANEL_VIEW_INSCRIPCIONES);
    });

    viewAsistenciaBtn.addEventListener("click", () => {
      setPanelView(PANEL_VIEW_ASISTENCIA);
    });

    viewCertificadosBtn.addEventListener("click", () => {
      setPanelView(PANEL_VIEW_CERTIFICADOS);
    });

    viewSorteosBtn.addEventListener("click", () => {
      setPanelView(PANEL_VIEW_SORTEOS);
    });

    raffleScreenClose.addEventListener("click", closeRaffleScreen);
    raffleScreen.addEventListener("click", (event) => {
      if (event.target === raffleScreen) {
        closeRaffleScreen();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && raffleScreen.classList.contains("is-open")) {
        closeRaffleScreen();
      }
    });

    renderViewButtons();
    refreshBtn.addEventListener("click", loadData);
    loadData();
  </script>
</body>
</html>
