<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración</title>
  <style>
    /* Estilos base del panel */
    :root {
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-color: #333333;
      --primary-color: #0056b3;
      --primary-hover: #004085;
      --border-color: #e0e0e0;
      --status-ok: #28a745;
      --status-error: #dc3545;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header y métricas */
    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      text-align: center;
    }

    .metric-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--primary-color);
    }

    /* Barra de estado y pestañas */
    .status {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .status.ok { background-color: #d4edda; color: #155724; }
    .status.error { background-color: #f8d7da; color: #721c24; }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .nav-btn {
      padding: 10px 18px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      cursor: pointer;
      border-radius: 6px;
      font-weight: 600;
    }

    .nav-btn.is-active {
      background: var(--primary-color);
      color: #fff;
      border-color: var(--primary-color);
    }

    /* Tarjeta de evento y tablas */
    .event-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 20px;
      padding: 20px;
    }

    .event-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .event-heading {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
    }

    /* Sorteo y Certificados */
    .raffle-box, .certificate-box {
      padding: 15px;
      background: #f8f9fa;
      border-radius: 6px;
      margin-top: 15px;
    }

    .raffle-actions {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-top: 10px;
    }

    .btn-event {
      padding: 8px 14px;
      border: none;
      background: var(--primary-color);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Modales */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.is-open {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 8px;
      max-width: 500px;
      width: 90%;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 15px;
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    .brand-logo-viewer img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="header-panel">
      <h1>Panel de Control</h1>
      <div>
        <span id="updatedAt"></span>
        <button id="refreshBtn" class="btn-event">Actualizar Datos</button>
      </div>
    </header>

    <!-- Indicador de Estado -->
    <div id="statusBox" class="status"></div>

    <!-- Métricas Generales -->
    <section class="metrics-grid">
      <div class="metric-card">
        <div>Total Inscriptos</div>
        <div id="totalValue" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div>Total Asistencias</div>
        <div id="attendanceTotalValue" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div>Total Almuerzos</div>
        <div id="lunchTotalValue" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div>Total Reconfirmados</div>
        <div id="reconfirmTotalValue" class="metric-value">0</div>
      </div>
    </section>

    <!-- Pestañas de Navegación del Panel -->
    <nav class="nav-tabs">
      <button id="viewInscripcionesBtn" class="nav-btn is-active">Inscripciones</button>
      <button id="viewAsistenciaBtn" class="nav-btn">Asistencia</button>
      <button id="viewLunchBtn" class="nav-btn">Almuerzo</button>
      <button id="viewSorteosBtn" class="nav-btn">Sorteos</button>
      <button id="viewCertificadosBtn" class="nav-btn">Certificados</button>
    </nav>

    <!-- Contenedor Principal de Eventos -->
    <main id="eventsContainer"></main>
  </div>

  <!-- Pantalla / Modal de Sorteo de Ganadores -->
  <div id="raffleScreen" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button id="raffleScreenClose" class="modal-close">&times;</button>
      <h2 id="raffleScreenEvent">Evento</h2>
      <div style="text-align: center; margin: 15px 0;">
        <img id="raffleScreenBrandLogo" src="" alt="Logo" style="max-height: 80px; cursor: pointer;">
        <br>
        <button id="raffleScreenLogoExpand" class="btn-event" style="margin-top: 5px;" hidden>Ampliar Logo</button>
        <h3 id="raffleScreenBrandName">Marca</h3>
      </div>
      <p id="raffleScreenSubtitle"></p>
      <div id="raffleScreenList" style="max-height: 300px; overflow-y: auto; margin-top: 15px;"></div>
    </div>
  </div>

  <!-- Visor de Logo de Marca -->
  <div id="brandLogoViewer" class="modal" aria-hidden="true">
    <div class="modal-content brand-logo-viewer" style="text-align: center;">
      <button id="brandLogoViewerClose" class="modal-close">&times;</button>
      <img id="brandLogoViewerImage" src="" alt="Vista Previa del Logo">
    </div>
  </div>

  <script>
    // Variables de Estado y Configuración
    const ADMIN_LOGIN_URL = "/login";
    const PANEL_VIEW_INSCRIPCIONES = "inscripciones";
    const PANEL_VIEW_ASISTENCIA = "asistencia";
    const PANEL_VIEW_ALMUERZO = "almuerzo";
    const PANEL_VIEW_SORTEOS = "sorteos";
    const PANEL_VIEW_CERTIFICADOS = "certificados";
    const DEFAULT_VISIBLE_ROWS = 10;

    let currentPanelView = PANEL_VIEW_INSCRIPCIONES;
    let currentAdminRole = "admin";
    let currentEventos = [];

    const expandedEventsByEvent = new Map();
    const visibleRowsByEvent = new Map();
    const raffleBrandByEvent = new Map();
    const raffleCountByEvent = new Map();
    const raffleWinnerByEvent = new Map();

    const toggleInFlight = new Set();
    const raffleInFlight = new Set();
    const certificateToggleInFlight = new Set();

    // Elementos DOM
    const statusBox = document.getElementById("statusBox");
    const totalValue = document.getElementById("totalValue");
    const attendanceTotalValue = document.getElementById("attendanceTotalValue");
    const lunchTotalValue = document.getElementById("lunchTotalValue");
    const reconfirmTotalValue = document.getElementById("reconfirmTotalValue");
    const updatedAt = document.getElementById("updatedAt");
    const refreshBtn = document.getElementById("refreshBtn");
    const eventsContainer = document.getElementById("eventsContainer");

    const viewInscripcionesBtn = document.getElementById("viewInscripcionesBtn");
    const viewAsistenciaBtn = document.getElementById("viewAsistenciaBtn");
    const viewLunchBtn = document.getElementById("viewLunchBtn");
    const viewSorteosBtn = document.getElementById("viewSorteosBtn");
    const viewCertificadosBtn = document.getElementById("viewCertificadosBtn");

    const raffleScreen = document.getElementById("raffleScreen");
    const raffleScreenClose = document.getElementById("raffleScreenClose");
    const raffleScreenEvent = document.getElementById("raffleScreenEvent");
    const raffleScreenBrandName = document.getElementById("raffleScreenBrandName");
    const raffleScreenBrandLogo = document.getElementById("raffleScreenBrandLogo");
    const raffleScreenLogoExpand = document.getElementById("raffleScreenLogoExpand");
    const raffleScreenSubtitle = document.getElementById("raffleScreenSubtitle");
    const raffleScreenList = document.getElementById("raffleScreenList");

    const brandLogoViewer = document.getElementById("brandLogoViewer");
    const brandLogoViewerClose = document.getElementById("brandLogoViewerClose");
    const brandLogoViewerImage = document.getElementById("brandLogoViewerImage");

    const RAFFLE_BRANDS = [
      { key: "ips", name: "IPS", logo: "/Prueba_2/assets/empresas/01_ips.png" },
      { key: "generic", name: "Institucional", logo: "/Prueba_2/assets/logo-plomeros-circular.png" }
    ];

    function setStatus(text, type = "") {
      statusBox.textContent = text;
      statusBox.className = "status " + type;
    }

    function formatDateTime(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);
      return isNaN(date.getTime()) ? isoString : date.toLocaleString("es-AR");
    }

    function sanitizeText(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updatePanelViewButtons() {
      const buttons = [
        { btn: viewInscripcionesBtn, view: PANEL_VIEW_INSCRIPCIONES },
        { btn: viewAsistenciaBtn, view: PANEL_VIEW_ASISTENCIA },
        { btn: viewLunchBtn, view: PANEL_VIEW_ALMUERZO },
        { btn: viewSorteosBtn, view: PANEL_VIEW_SORTEOS },
        { btn: viewCertificadosBtn, view: PANEL_VIEW_CERTIFICADOS }
      ];

      buttons.forEach(({ btn, view }) => {
        if (!btn) return;
        if (currentPanelView === view) {
          btn.classList.add("is-active");
          btn.setAttribute("aria-selected", "true");
        } else {
          btn.classList.remove("is-active");
          btn.setAttribute("aria-selected", "false");
        }
      });
    }

    function switchPanelView(view) {
      currentPanelView = view;
      updatePanelViewButtons();
      renderEvents(currentEventos);
    }

    [
      { btn: viewInscripcionesBtn, view: PANEL_VIEW_INSCRIPCIONES },
      { btn: viewAsistenciaBtn, view: PANEL_VIEW_ASISTENCIA },
      { btn: viewLunchBtn, view: PANEL_VIEW_ALMUERZO },
      { btn: viewSorteosBtn, view: PANEL_VIEW_SORTEOS },
      { btn: viewCertificadosBtn, view: PANEL_VIEW_CERTIFICADOS }
    ].forEach(({ btn, view }) => {
      if (btn) {
        btn.addEventListener("click", () => switchPanelView(view));
      }
    });

    function getBrandConfig(brandKey) {
      return RAFFLE_BRANDS.find(b => b.key === brandKey) || RAFFLE_BRANDS[RAFFLE_BRANDS.length - 1];
    }

    function openRaffleScreen(eventoTitle, brandKey, winners = []) {
      const brand = getBrandConfig(brandKey);
      raffleScreenEvent.textContent = eventoTitle;
      raffleScreenBrandName.textContent = brand.name;
      raffleScreenBrandLogo.src = brand.logo;
      raffleScreenBrandLogo.alt = `Logo de ${brand.name}`;

      if (brand.logo.endsWith('.svg')) {
        raffleScreenLogoExpand.hidden = false;
        raffleScreenBrandLogo.onclick = () => openBrandLogoViewer(brand.logo, brand.name, true);
      } else {
        raffleScreenLogoExpand.hidden = false;
        raffleScreenBrandLogo.onclick = () => openBrandLogoViewer(brand.logo, brand.name, false);
      }

      raffleScreenSubtitle.textContent = `${winners.length} ganador(es) seleccionado(s)`;
      raffleScreenList.innerHTML = winners.length === 0 
        ? `<div class="raffle-screen-item"><div class="raffle-screen-item-name">Sin ganadores</div></div>`
        : winners.map(w => `
            <div class="raffle-screen-item">
              <div class="raffle-screen-item-name">${sanitizeText(w.nombre)} ${sanitizeText(w.apellido)}</div>
              <div class="raffle-screen-item-dni">DNI: ${sanitizeText(w.dni || "-")} | Mail: ${sanitizeText(w.email || "-")}</div>
            </div>
          `).join("");

      raffleScreen.classList.add("is-open");
      raffleScreen.setAttribute("aria-hidden", "false");
    }

    function closeRaffleScreen() {
      raffleScreen.classList.remove("is-open");
      raffleScreen.setAttribute("aria-hidden", "true");
    }

    raffleScreenClose.addEventListener("click", closeRaffleScreen);

    function openBrandLogoViewer(src, alt, isVector) {
      brandLogoViewerImage.src = src;
      brandLogoViewerImage.alt = alt;
      if (isVector) {
        brandLogoViewerImage.classList.add("is-vector");
      } else {
        brandLogoViewerImage.classList.remove("is-vector");
      }
      brandLogoViewer.classList.add("is-open");
      brandLogoViewer.setAttribute("aria-hidden", "false");
    }

    function closeBrandLogoViewer() {
      brandLogoViewer.classList.remove("is-open");
      brandLogoViewer.setAttribute("aria-hidden", "true");
    }

    brandLogoViewerClose.addEventListener("click", closeBrandLogoViewer);
    raffleScreenLogoExpand.addEventListener("click", () => {
      openBrandLogoViewer(raffleScreenBrandLogo.src, raffleScreenBrandName.textContent, raffleScreenBrandLogo.src.endsWith('.svg'));
    });

    async function fetchData() {
      setStatus("Cargando datos...");
      try {
        const response = await fetch("/api/admin?action=get_data");
        if (response.status === 401 || response.redirected) {
          window.location.href = ADMIN_LOGIN_URL;
          return;
        }
        if (!response.ok) throw new Error("Error en la respuesta del servidor");
        
        const data = await response.json();
        currentAdminRole = data.role || "admin";
        currentEventos = data.eventos || [];

        let grandTotal = 0;
        let attendanceTotal = 0;
        let lunchTotal = 0;
        let reconfirmTotal = 0;

        currentEventos.forEach(ev => {
          const list = ev.inscripciones || [];
          grandTotal += list.length;
          attendanceTotal += list.filter(i => i.asistio).length;
          lunchTotal += list.filter(i => i.almuerzo).length;
          reconfirmTotal += list.filter(i => i.reconfirmo).length;
        });

        totalValue.textContent = grandTotal;
        attendanceTotalValue.textContent = attendanceTotal;
        lunchTotalValue.textContent = lunchTotal;
        reconfirmTotalValue.textContent = reconfirmTotal;
        updatedAt.textContent = `Actualizado: ${new Date().toLocaleTimeString("es-AR")}`;

        setStatus("");
        renderEvents(currentEventos);
      } catch (err) {
        setStatus("Error al cargar los datos. Reintente.", "error");
      }
    }

    function renderEvents(eventos) {
      eventsContainer.innerHTML = "";
      if (!eventos || eventos.length === 0) {
        eventsContainer.innerHTML = `<div class="empty">No hay eventos para mostrar.</div>`;
        return;
      }

      eventos.forEach(evento => {
        const eventId = evento.id;
        const isCollapsed = expandedEventsByEvent.get(eventId) === false;
        const inscripciones = evento.inscripciones || [];
        const visibleCount = visibleRowsByEvent.get(eventId) || DEFAULT_VISIBLE_ROWS;

        const card = document.createElement("article");
        card.className = `event-card ${isCollapsed ? "is-collapsed" : ""}`;

        let counterLabel = `Inscriptos: ${inscripciones.length}`;
        if (currentPanelView === PANEL_VIEW_ASISTENCIA) {
          counterLabel = `Asistencias: ${inscripciones.filter(i => i.asistio).length} / ${inscripciones.length}`;
        } else if (currentPanelView === PANEL_VIEW_ALMUERZO) {
          counterLabel = `Almuerzos: ${inscripciones.filter(i => i.almuerzo).length} / ${inscripciones.length}`;
        }

        const headHTML = `
          <div class="event-head">
            <div class="event-heading">
              <button class="event-expand" aria-expanded="${!isCollapsed}" data-event="${eventId}">
                <span class="event-expand-icon"></span>
              </button>
              <h2 class="event-title">${sanitizeText(evento.titulo)}</h2>
            </div>
            <div class="event-meta">
              <span class="counter ${currentPanelView === PANEL_VIEW_ASISTENCIA ? 'counter-attendance' : ''}">${counterLabel}</span>
              <span class="event-state ${evento.activo ? 'is-on' : 'is-off'}">${evento.activo ? 'Inscripción Abierta' : 'Cerrada'}</span>
              <button class="btn-event btn-toggle ${evento.activo ? 'is-on' : 'is-off'}" data-toggle-event="${eventId}">
                ${evento.activo ? 'Cerrar inscripciones' : 'Abrir inscripciones'}
              </button>
            </div>
          </div>
        `;

        let bodyHTML = "";
        if (!isCollapsed) {
          if (currentPanelView === PANEL_VIEW_INSCRIPCIONES || currentPanelView === PANEL_VIEW_ASISTENCIA || currentPanelView === PANEL_VIEW_ALMUERZO) {
            const rowsToDisplay = inscripciones.slice(0, visibleCount);
            
            let tableHeaders = `
              <th>Nombre</th>
              <th>DNI</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Localidad</th>
            `;

            if (currentPanelView === PANEL_VIEW_ASISTENCIA) {
              tableHeaders += `<th class="attendance-col">Asistió</th>`;
            } else if (currentPanelView === PANEL_VIEW_ALMUERZO) {
              tableHeaders += `<th class="attendance-col">Almuerzo</th>`;
            } else {
              tableHeaders += `<th class="reconfirm-col">Reconfirmó</th>`;
            }

            const rowsHTML = rowsToDisplay.map(item => {
              let actionCell = "";
              if (currentPanelView === PANEL_VIEW_ASISTENCIA) {
                actionCell = `<td class="attendance-col"><input type="checkbox" class="attendance-checkbox" ${item.asistio ? "checked" : ""} data-id="${item.id}" data-type="asistio"></td>`;
              } else if (currentPanelView === PANEL_VIEW_ALMUERZO) {
                actionCell = `<td class="attendance-col"><input type="checkbox" class="attendance-checkbox" ${item.almuerzo ? "checked" : ""} data-id="${item.id}" data-type="almuerzo"></td>`;
              } else {
                actionCell = `<td class="reconfirm-col">${item.reconfirmo ? "Sí" : "No"}</td>`;
              }

              return `
                <tr>
                  <td><strong>${sanitizeText(item.nombre)} ${sanitizeText(item.apellido)}</strong></td>
                  <td>${sanitizeText(item.dni || "-")}</td>
                  <td>${sanitizeText(item.email || "-")}</td>
                  <td>${sanitizeText(item.telefono || "-")}</td>
                  <td>${sanitizeText(item.localidad || "-")}</td>
                  ${actionCell}
                </tr>
              `;
            }).join("");

            bodyHTML = `
              <div class="table-wrap">
                <table>
                  <thead><tr>${tableHeaders}</tr></thead>
                  <tbody>${rowsHTML.length ? rowsHTML : '<tr><td colspan="6">Sin registros.</td></tr>'}</tbody>
                </table>
              </div>
              ${inscripciones.length > visibleCount ? `
                <div class="rows-controls">
                  <span class="rows-info">Mostrando ${visibleCount} de ${inscripciones.length}</span>
                  <button class="btn-event" data-more-event="${eventId}">Ver más</button>
                </div>
              ` : ''}
            `;
          } else if (currentPanelView === PANEL_VIEW_SORTEOS) {
            const selectedBrand = raffleBrandByEvent.get(eventId) || RAFFLE_BRANDS[0].key;
            const count = raffleCountByEvent.get(eventId) || 1;
            const winners = raffleWinnerByEvent.get(eventId) || [];

            const brandOptions = RAFFLE_BRANDS.map(b => `<option value="${b.key}" ${b.key === selectedBrand ? "selected" : ""}>${b.name}</option>`).join("");

            bodyHTML = `
              <div class="raffle-box">
                <div class="raffle-title">Sorteo de premios</div>
                <div class="raffle-hint">Seleccione la marca y la cantidad de ganadores a sortear entre los asistentes reconfirmados/presentes.</div>
                <div class="raffle-actions">
                  <div class="raffle-brand-wrap">
                    <span class="raffle-brand-label">Marca:</span>
                    <select class="raffle-brand-select" data-raffle-brand="${eventId}">${brandOptions}</select>
                  </div>
                  <div class="raffle-count-wrap">
                    <span class="raffle-count-label">Cantidad:</span>
                    <input type="number" class="raffle-count-input" value="${count}" min="1" max="50" data-raffle-count="${eventId}">
                  </div>
                  <button class="btn-event" data-run-raffle="${eventId}">Realizar Sorteo</button>
                  ${winners.length > 0 ? `<button class="btn-event" data-show-raffle="${eventId}">Ver Pantalla Ganadores</button>` : ''}
                </div>
              </div>
            `;
          } else if (currentPanelView === PANEL_VIEW_CERTIFICADOS) {
            bodyHTML = `
              <div class="certificate-box">
                <div class="certificate-title">Certificados de Asistencia</div>
                <div class="certificate-hint">Envíe los certificados digitales por correo a los asistentes confirmados de este encuentro.</div>
                <div class="certificate-actions">
                  <button class="btn-event" data-send-certificates="${eventId}">Enviar Certificados a Asistentes</button>
                </div>
              </div>
            `;
          }
        }

        card.innerHTML = headHTML + bodyHTML;
        eventsContainer.appendChild(card);
      });

      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll(".event-expand").forEach(btn => {
        btn.onclick = (e) => {
          const id = e.currentTarget.getAttribute("data-event");
          const current = expandedEventsByEvent.get(id);
          expandedEventsByEvent.set(id, current === false ? true : false);
          renderEvents(currentEventos);
        };
      });

      document.querySelectorAll(".btn-toggle").forEach(btn => {
        btn.onclick = async (e) => {
          const id = e.currentTarget.getAttribute("data-toggle-event");
          if (toggleInFlight.has(id)) return;
          toggleInFlight.add(id);

          try {
            const res = await fetch("/api/admin", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({ action: "toggle_event", event_id: id })
            });
            if (res.ok) await fetchData();
          } catch (err) {
            setStatus("Error al cambiar estado del evento", "error");
          } finally {
            toggleInFlight.delete(id);
          }
        };
      });

      document.querySelectorAll("[data-more-event]").forEach(btn => {
        btn.onclick = (e) => {
          const id = e.currentTarget.getAttribute("data-more-event");
          const current = visibleRowsByEvent.get(id) || DEFAULT_VISIBLE_ROWS;
          visibleRowsByEvent.set(id, current + DEFAULT_VISIBLE_ROWS);
          renderEvents(currentEventos);
        };
      });

      document.querySelectorAll(".attendance-checkbox").forEach(chk => {
        chk.onchange = async (e) => {
          const id = e.target.getAttribute("data-id");
          const type = e.target.getAttribute("data-type");
          const value = e.target.checked;

          try {
            await fetch("/api/admin", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({ action: "update_attendance", id, field: type, value })
            });
          } catch (err) {
            e.target.checked = !value;
            setStatus("Error al actualizar la asistencia", "error");
          }
        };
      });

      document.querySelectorAll("[data-raffle-brand]").forEach(sel => {
        sel.onchange = (e) => {
          const id = e.target.getAttribute("data-raffle-brand");
          raffleBrandByEvent.set(id, e.target.value);
        };
      });

      document.querySelectorAll("[data-raffle-count]").forEach(inp => {
        inp.onchange = (e) => {
          const id = e.target.getAttribute("data-raffle-count");
          raffleCountByEvent.set(id, parseInt(e.target.value, 10) || 1);
        };
      });

      document.querySelectorAll("[data-run-raffle]").forEach(btn => {
        btn.onclick = async (e) => {
          const id = e.currentTarget.getAttribute("data-run-raffle");
          const count = raffleCountByEvent.get(id) || 1;
          const brandKey = raffleBrandByEvent.get(id) || RAFFLE_BRANDS[0].key;

          if (raffleInFlight.has(id)) return;
          raffleInFlight.add(id);

          try {
            const res = await fetch("/api/admin", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({ action: "run_raffle", event_id: id, count, brand: brandKey })
            });
            const data = await res.json();
            if (res.ok && data.winners) {
              raffleWinnerByEvent.set(id, data.winners);
              const eventObj = currentEventos.find(ev => ev.id == id);
              openRaffleScreen(eventObj ? eventObj.titulo : "Sorteo", brandKey, data.winners);
              renderEvents(currentEventos);
            } else {
              setStatus(data.error || "Error al realizar el sorteo", "error");
            }
          } catch (err) {
            setStatus("Error de conexión al ejecutar el sorteo", "error");
          } finally {
            raffleInFlight.delete(id);
          }
        };
      });

      document.querySelectorAll("[data-show-raffle]").forEach(btn => {
        btn.onclick = (e) => {
          const id = e.currentTarget.getAttribute("data-show-raffle");
          const winners = raffleWinnerByEvent.get(id) || [];
          const brandKey = raffleBrandByEvent.get(id) || RAFFLE_BRANDS[0].key;
          const eventObj = currentEventos.find(ev => ev.id == id);
          openRaffleScreen(eventObj ? eventObj.titulo : "Sorteo", brandKey, winners);
        };
      });

      document.querySelectorAll("[data-send-certificates]").forEach(btn => {
        btn.onclick = async (e) => {
          const id = e.currentTarget.getAttribute("data-send-certificates");
          if (!confirm("¿Confirma el envío de certificados masivos a todos los asistentes?")) return;

          if (certificateToggleInFlight.has(id)) return;
          certificateToggleInFlight.add(id);

          try {
            const res = await fetch("/api/admin", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({ action: "send_certificates", event_id: id })
            });
            if (res.ok) {
              setStatus("Certificados enviados exitosamente", "ok");
            } else {
              setStatus("Error al enviar los certificados", "error");
            }
          } catch (err) {
            setStatus("Error al procesar el envío de certificados", "error");
          } finally {
            certificateToggleInFlight.delete(id);
          }
        };
      });
    }

    refreshBtn.addEventListener("click", fetchData);

    // Carga inicial
    fetchData();
  </script>
</body>
</html>
