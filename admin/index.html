<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/Prueba_2/assets/logo-plomeros-circular.png">
  <link rel="apple-touch-icon" href="/Prueba_2/assets/logo-plomeros-circular.png">
  <title>Panel Admin | Inscripciones</title>
  <style>
    :root {
      --ink: #13233a;
      --muted: #4d627e;
      --bg: #eef4fb;
      --card: #ffffff;
      --line: #d3deec;
      --accent: #0f4ea8;
      --accent-soft: #e4efff;
      --ok: #1f7a45;
      --warn: #7f5a00;
      --off: #8f241f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: "Barlow", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at -10% -10%, #d9e9ff 0%, transparent 60%),
        radial-gradient(700px 400px at 110% 0%, #ffe9d0 0%, transparent 58%),
        var(--bg);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .top {
      background: linear-gradient(135deg, #0f4ea8 0%, #1d6fd0 100%);
      border-radius: 16px;
      color: #fff;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      box-shadow: 0 18px 30px rgba(14, 63, 134, 0.22);
    }

    .top h1 {
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .summary {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      color: #d9e9ff;
      font-weight: 600;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-weight: 700;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      background: #ffffff;
      color: var(--accent);
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .view-switch {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-view {
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      padding: 7px 12px;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-view.is-active {
      background: #ffffff;
      color: var(--accent);
      border-color: #ffffff;
    }

    .events {
      display: grid;
      gap: 14px;
    }

    .event-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    .event-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .event-title {
      font-size: 1.12rem;
      line-height: 1.2;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff;
      color: var(--ok);
      border: 1px solid #b8dec7;
      font-weight: 800;
      white-space: nowrap;
    }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-event {
      border: 1px solid #95b8ea;
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
      padding: 6px 11px;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-toggle {
      border-color: #d6b986;
      color: #7d4f00;
    }

    .btn-toggle.is-on {
      border-color: #c9e2d1;
      color: var(--ok);
    }

    .btn-toggle.is-off {
      border-color: #f1b5af;
      color: var(--off);
    }

    .btn-event:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .event-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 6px 10px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .event-state.is-on {
      color: var(--ok);
      border-color: #b8dec7;
      background: #f5fff9;
    }

    .event-state.is-off {
      color: var(--off);
      border-color: #f1b5af;
      background: #fff4f3;
    }

    .empty {
      padding: 16px;
      color: var(--muted);
      font-weight: 600;
    }

    .table-wrap {
      overflow: auto;
    }

    .rows-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 16px 16px;
      border-top: 1px solid #edf2f8;
      background: #fbfdff;
    }

    .rows-info {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      margin-right: 6px;
    }

    .attendance-box {
      margin: 14px 16px 0;
      padding: 12px;
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #f7fbff;
    }

    .attendance-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .attendance-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .attendance-input {
      width: 190px;
      max-width: 100%;
      border: 1px solid #afc4e5;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      font-size: 0.9rem;
      color: var(--ink);
      background: #fff;
    }

    .attendance-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
    }

    .attendance-error {
      margin-top: 8px;
      color: #8f241f;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .attendance-result {
      margin-top: 10px;
      border: 1px solid #dbe6f5;
      border-radius: 10px;
      background: #ffffff;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .attendance-row {
      font-size: 0.9rem;
      color: #213750;
    }

    .attendance-check-wrap {
      margin-top: 4px;
    }

    .btn-attendance-check {
      border: 0;
      border-radius: 999px;
      background: #188645;
      color: #fff;
      padding: 7px 13px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-attendance-check.is-done {
      background: #0f6f38;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th,
    td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #edf2f8;
      vertical-align: top;
      font-size: 0.94rem;
    }

    th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4e6482;
      background: #f8fbff;
    }

    td {
      color: #213750;
    }

    .attendance-col {
      text-align: center;
      width: 88px;
      white-space: nowrap;
    }

    .attendance-checkbox {
      width: 16px;
      height: 16px;
      accent-color: #188645;
      cursor: pointer;
      vertical-align: middle;
    }

    .status {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .status.error {
      border-color: #f1b5af;
      background: #fdeceb;
      color: #8f241f;
    }

    .status.warning {
      border-color: #ebd7ac;
      background: #fff6df;
      color: var(--warn);
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div>
        <h1>Panel de inscripciones</h1>
        <div class="summary">
          <span class="pill">Total: <strong id="totalValue">0</strong></span>
          <span id="updatedAt">Sin actualización</span>
        </div>
      </div>
      <div class="top-actions">
        <div class="view-switch" role="tablist" aria-label="Vista del panel">
          <button class="btn-view is-active" id="viewInscripcionesBtn" type="button">Inscripciones</button>
          <button class="btn-view" id="viewAsistenciaBtn" type="button">Asistencia Encuentros</button>
        </div>
        <button class="btn" id="refreshBtn" type="button">Actualizar</button>
      </div>
    </header>

    <div class="status" id="status">Cargando datos...</div>
    <section class="events" id="eventsContainer"></section>
  </main>

  <script>
    const statusBox = document.getElementById("status");
    const eventsContainer = document.getElementById("eventsContainer");
    const totalValue = document.getElementById("totalValue");
    const updatedAt = document.getElementById("updatedAt");
    const refreshBtn = document.getElementById("refreshBtn");
    const viewInscripcionesBtn = document.getElementById("viewInscripcionesBtn");
    const viewAsistenciaBtn = document.getElementById("viewAsistenciaBtn");
    const DEFAULT_VISIBLE_ROWS = 25;
    const PANEL_VIEW_INSCRIPCIONES = "inscripciones";
    const PANEL_VIEW_ASISTENCIA = "asistencia";
    let currentPanelView = PANEL_VIEW_INSCRIPCIONES;
    let currentEventos = [];
    const toggleInFlight = new Set();
    const visibleRowsByEvent = new Map();
    const attendanceLookupByEvent = new Map();
    const attendanceConfirmedByEvent = new Map();

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return new Intl.DateTimeFormat("es-AR", {
        dateStyle: "short",
        timeStyle: "short"
      }).format(date);
    }

    function setStatusMessage(message, mode = "ok") {
      statusBox.classList.remove("error", "warning");
      if (mode === "error") {
        statusBox.classList.add("error");
      } else if (mode === "warning") {
        statusBox.classList.add("warning");
      }
      statusBox.textContent = message;
    }

    function renderViewButtons() {
      viewInscripcionesBtn.classList.toggle("is-active", currentPanelView === PANEL_VIEW_INSCRIPCIONES);
      viewAsistenciaBtn.classList.toggle("is-active", currentPanelView === PANEL_VIEW_ASISTENCIA);
      viewInscripcionesBtn.setAttribute(
        "aria-pressed",
        currentPanelView === PANEL_VIEW_INSCRIPCIONES ? "true" : "false"
      );
      viewAsistenciaBtn.setAttribute(
        "aria-pressed",
        currentPanelView === PANEL_VIEW_ASISTENCIA ? "true" : "false"
      );
    }

    function setPanelView(nextView) {
      if (
        nextView !== PANEL_VIEW_INSCRIPCIONES &&
        nextView !== PANEL_VIEW_ASISTENCIA
      ) {
        return;
      }
      if (currentPanelView === nextView) return;
      currentPanelView = nextView;
      renderViewButtons();
      renderEvents(currentEventos);
    }

    function isEventActive(item) {
      return item?.activo !== false;
    }

    function getEventKey(item, index) {
      return `${String(item?.evento || "evento").toLowerCase()}::${index}`;
    }

    function getVisibleRows(item, index, totalRows) {
      const key = getEventKey(item, index);
      const savedValue = Number.parseInt(String(visibleRowsByEvent.get(key) ?? ""), 10);
      const baseValue = Number.isFinite(savedValue) ? savedValue : DEFAULT_VISIBLE_ROWS;
      const nextValue = Math.max(0, Math.min(baseValue, totalRows));
      visibleRowsByEvent.set(key, nextValue);
      return nextValue;
    }

    function setVisibleRows(item, index, nextValue) {
      const key = getEventKey(item, index);
      const totalRows = Array.isArray(item?.inscripciones) ? item.inscripciones.length : 0;
      const clamped = Math.max(0, Math.min(Number(nextValue) || 0, totalRows));
      visibleRowsByEvent.set(key, clamped);
    }

    function getAttendanceLookup(item, index) {
      const key = getEventKey(item, index);
      if (!attendanceLookupByEvent.has(key)) {
        attendanceLookupByEvent.set(key, {
          searched: false,
          numero: "",
          row: null,
          error: ""
        });
      }
      return attendanceLookupByEvent.get(key);
    }

    function getAttendanceConfirmedSet(item, index) {
      const key = getEventKey(item, index);
      if (!attendanceConfirmedByEvent.has(key)) {
        attendanceConfirmedByEvent.set(key, new Set());
      }
      return attendanceConfirmedByEvent.get(key);
    }

    function normalizeDniValue(value) {
      return String(value ?? "").replace(/\D+/g, "").trim();
    }

    function searchAttendanceByDni(item, index, rawDni) {
      const state = getAttendanceLookup(item, index);
      const cleaned = normalizeDniValue(rawDni);

      state.searched = true;
      state.numero = cleaned;
      state.row = null;
      state.error = "";

      if (!cleaned) {
        state.error = "Ingresa un DNI valido.";
        return;
      }

      const rows = Array.isArray(item?.inscripciones) ? item.inscripciones : [];
      const found = rows.find((entry) => {
        const rowDni = normalizeDniValue(entry.dni);
        return rowDni === cleaned;
      }) || null;

      if (!found) {
        state.error = "No se encontro una persona con ese DNI en este encuentro.";
        return;
      }

      state.row = found;
      state.numero = cleaned;
    }

    function confirmAttendance(item, index, dni) {
      const normalizedDni = normalizeDniValue(dni);
      if (!normalizedDni) return;
      const confirmed = getAttendanceConfirmedSet(item, index);
      confirmed.add(normalizedDni);
    }

    function setAttendanceConfirmed(item, index, dni, checked) {
      const normalizedDni = normalizeDniValue(dni);
      if (!normalizedDni) return;
      const confirmed = getAttendanceConfirmedSet(item, index);
      if (checked) {
        confirmed.add(normalizedDni);
      } else {
        confirmed.delete(normalizedDni);
      }
    }

    function isAttendanceConfirmed(item, index, dni) {
      const normalizedDni = normalizeDniValue(dni);
      if (!normalizedDni) return false;
      return getAttendanceConfirmedSet(item, index).has(normalizedDni);
    }

    function buildAttendanceResultHtml(item, index) {
      const rows = Array.isArray(item?.inscripciones) ? item.inscripciones : [];
      if (rows.length === 0) {
        return `<p class="attendance-hint">No hay inscriptos para buscar en este encuentro.</p>`;
      }

      const state = getAttendanceLookup(item, index);

      if (!state.searched) {
        return `<p class="attendance-hint">Ingresa un DNI para ver los datos.</p>`;
      }

      if (state.error) {
        return `<p class="attendance-error">${escapeHtml(state.error)}</p>`;
      }

      if (!state.row) {
        return `<p class="attendance-hint">No se encontro informacion del DNI buscado.</p>`;
      }

      const row = state.row;
      const confirmed = isAttendanceConfirmed(item, index, row.dni);

      return `
        <div class="attendance-result">
          <p class="attendance-row"><strong>DNI:</strong> ${escapeHtml(row.dni || "-")}</p>
          <p class="attendance-row"><strong>Nombre y apellido:</strong> ${escapeHtml(row.nombre_apellido || "-")}</p>
          <p class="attendance-row"><strong>Mail:</strong> ${escapeHtml(row.mail || "-")}</p>
          <p class="attendance-row"><strong>Localidad:</strong> ${escapeHtml(row.localidad || "-")}</p>
          <div class="attendance-check-wrap">
            <button
              class="btn-attendance-check ${confirmed ? "is-done" : ""}"
              type="button"
              data-attendance-confirm="${index}"
              data-attendance-dni="${escapeHtml(row.dni ?? "")}"
            >
              ${confirmed ? "&#10003; Asistencia marcada" : "&#10003;"}
            </button>
          </div>
        </div>
      `;
    }

    function buildRows(rows, eventItem, eventIndex) {
      return rows
        .map((item) => `
          <tr>
            <td>${escapeHtml(item.id_evento ?? "-")}</td>
            <td>${escapeHtml(formatDate(item.created_at))}</td>
            <td>${escapeHtml(item.nombre_apellido || "-")}</td>
            <td>${escapeHtml(item.dni || "-")}</td>
            <td>${escapeHtml(item.mail || "-")}</td>
            <td>${escapeHtml(item.provincia || "-")}</td>
            <td>${escapeHtml(item.localidad || "-")}</td>
            <td>${escapeHtml(item.profesion_label || item.profesion || "-")}</td>
            <td class="attendance-col">
              <input
                class="attendance-checkbox"
                type="checkbox"
                data-attendance-row-toggle="${eventIndex}"
                data-attendance-dni="${escapeHtml(item.dni ?? "")}"
                ${isAttendanceConfirmed(eventItem, eventIndex, item.dni) ? "checked" : ""}
              />
            </td>
          </tr>
        `)
        .join("");
    }

    function sanitizeFileName(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "evento";
    }

    function buildExcelRows(rows) {
      return rows
        .map((item) => `
          <tr>
            <td>${escapeHtml(item.id_evento ?? "-")}</td>
            <td>${escapeHtml(formatDate(item.created_at))}</td>
            <td>${escapeHtml(item.nombre_apellido || "-")}</td>
            <td style="mso-number-format:'\\@';">${escapeHtml(item.dni || "-")}</td>
            <td>${escapeHtml(item.mail || "-")}</td>
            <td>${escapeHtml(item.provincia || "-")}</td>
            <td>${escapeHtml(item.localidad || "-")}</td>
            <td>${escapeHtml(item.asociado || "-")}</td>
            <td>${escapeHtml(item.profesion_label || item.profesion || "-")}</td>
            <td>${escapeHtml(item.origen || "-")}</td>
          </tr>
        `)
        .join("");
    }

    function downloadEventExcel(eventName, rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        return;
      }

      const safeEventName = escapeHtml(eventName || "Evento");
      const html = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
          <head>
            <meta charset="UTF-8">
          </head>
          <body>
            <table border="1">
              <thead>
                <tr>
                  <th colspan="10">Evento ${safeEventName}</th>
                </tr>
                <tr>
                  <th>ID encuentro</th>
                  <th>Fecha</th>
                  <th>Nombre y apellido</th>
                  <th>DNI</th>
                  <th>Mail</th>
                  <th>Provincia</th>
                  <th>Localidad</th>
                  <th>Asociado</th>
                  <th>Profesión</th>
                  <th>Origen</th>
                </tr>
              </thead>
              <tbody>
                ${buildExcelRows(rows)}
              </tbody>
            </table>
          </body>
        </html>
      `;

      const blob = new Blob(["\ufeff", html], {
        type: "application/vnd.ms-excel;charset=utf-8;"
      });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `inscripciones-${sanitizeFileName(eventName)}.xls`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function renderEvents(eventos) {
      currentEventos = Array.isArray(eventos) ? eventos : [];

      if (!Array.isArray(eventos) || eventos.length === 0) {
        eventsContainer.innerHTML = `
          <article class="event-card">
            <p class="empty">No hay eventos para mostrar.</p>
          </article>
        `;
        return;
      }

      eventsContainer.innerHTML = eventos
        .map((item, index) => {
          const rows = Array.isArray(item.inscripciones) ? item.inscripciones : [];
          const visibleRows = getVisibleRows(item, index, rows.length);
          const rowsToRender = rows.slice(0, visibleRows);
          const canShowMore = visibleRows < rows.length;
          const canShowLess = visibleRows > Math.min(DEFAULT_VISIBLE_ROWS, rows.length);
          const attendanceLookup = getAttendanceLookup(item, index);
          const showInscripciones = currentPanelView === PANEL_VIEW_INSCRIPCIONES;
          const showAsistencia = currentPanelView === PANEL_VIEW_ASISTENCIA;

          const attendanceSectionHtml = `
            <section class="attendance-box">
              <h3 class="attendance-title">Asistencia encuentro</h3>
              <div class="attendance-form">
                <input
                  class="attendance-input"
                  type="text"
                  inputmode="numeric"
                  data-attendance-input="${index}"
                  placeholder="DNI"
                  value="${escapeHtml(attendanceLookup.numero || "")}"
                  ${rows.length === 0 ? "disabled" : ""}
                />
                <button
                  class="btn-event"
                  type="button"
                  data-attendance-search="${index}"
                  ${rows.length === 0 ? "disabled" : ""}
                >
                  Buscar
                </button>
              </div>
              ${buildAttendanceResultHtml(item, index)}
            </section>
          `;

          const inscripcionesSectionHtml =
            rows.length === 0
              ? `<p class="empty">No hay inscripciones en este evento.</p>`
              : `
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>ID encuentro</th>
                        <th>Fecha</th>
                        <th>Nombre y apellido</th>
                        <th>DNI</th>
                        <th>Mail</th>
                        <th>Provincia</th>
                        <th>Localidad</th>
                        <th>Profesión</th>
                        <th class="attendance-col">Asistio</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${buildRows(rowsToRender, item, index)}
                    </tbody>
                  </table>
                </div>
                <div class="rows-controls">
                  <span class="rows-info">Mostrando ${visibleRows} de ${rows.length}</span>
                  <button
                    class="btn-event"
                    type="button"
                    data-show-more="${index}"
                    ${canShowMore ? "" : "disabled"}
                  >
                    Ver m&aacute;s
                  </button>
                  <button
                    class="btn-event"
                    type="button"
                    data-show-less="${index}"
                    ${canShowLess ? "" : "disabled"}
                  >
                    Ver menos
                  </button>
                </div>
              `;

          return `
            <article class="event-card">
              <header class="event-head">
                <h2 class="event-title">Evento ${escapeHtml(item.evento || "Sin evento")}</h2>
                <div class="event-meta">
                  <span class="counter">${rows.length} inscriptos</span>
                  <span class="event-state ${isEventActive(item) ? "is-on" : "is-off"}">
                    ${isEventActive(item) ? "Activo" : "Inactivo"}
                  </span>
                  <button
                    class="btn-event btn-toggle ${isEventActive(item) ? "is-on" : "is-off"}"
                    type="button"
                    data-toggle-event="${index}"
                    ${toggleInFlight.has(index) ? "disabled" : ""}
                  >
                    ${isEventActive(item) ? "Desactivar" : "Activar"}
                  </button>
                  ${
                    showInscripciones
                      ? `
                        <button
                          class="btn-event"
                          type="button"
                          data-download-event="${index}"
                          ${rows.length === 0 ? "disabled" : ""}
                        >
                          Descargar Excel
                        </button>
                      `
                      : ""
                  }
                </div>
              </header>
              ${showAsistencia ? attendanceSectionHtml : ""}
              ${showInscripciones ? inscripcionesSectionHtml : ""}
            </article>
          `;
        })
        .join("");
    }

    async function loadData() {
      setStatusMessage("Actualizando datos...");
      refreshBtn.disabled = true;

      try {
        const response = await fetch("/api/admin-inscripciones", {
          method: "GET",
          headers: { "Accept": "application/json" }
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar el panel.");
        }

        totalValue.textContent = String(data.total ?? 0);
        updatedAt.textContent = data.generated_at
          ? `Actualizado: ${formatDate(data.generated_at)}`
          : "Actualizado";

        renderEvents(data.eventos || []);
        if (data.status_warning) {
          setStatusMessage(data.status_warning, "warning");
        } else {
          setStatusMessage("Datos cargados correctamente.");
        }
      } catch (error) {
        setStatusMessage(`Error: ${error.message}`, "error");
      } finally {
        refreshBtn.disabled = false;
      }
    }

    async function toggleEvent(index) {
      if (!Number.isInteger(index) || toggleInFlight.has(index)) return;

      const selected = currentEventos[index];
      if (!selected || !selected.evento) return;

      const nextActive = !isEventActive(selected);
      toggleInFlight.add(index);
      renderEvents(currentEventos);

      try {
        const response = await fetch("/api/admin-inscripciones", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            evento: selected.evento,
            activo: nextActive
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.ok) {
          const sqlHint = typeof data.sql === "string" && data.sql ? ` SQL: ${data.sql}` : "";
          throw new Error((data.error || "No se pudo actualizar el estado.") + sqlHint);
        }

        selected.activo = data.activo !== false;
        renderEvents(currentEventos);
        setStatusMessage(
          `Evento ${selected.evento}: ${selected.activo ? "activo" : "inactivo"}.`
        );
      } catch (error) {
        setStatusMessage(`Error: ${error.message}`, "error");
      } finally {
        toggleInFlight.delete(index);
        renderEvents(currentEventos);
      }
    }

    eventsContainer.addEventListener("click", async (event) => {
      const toggleButton = event.target.closest("[data-toggle-event]");
      if (toggleButton) {
        const toggleIndex = Number.parseInt(toggleButton.getAttribute("data-toggle-event"), 10);
        await toggleEvent(toggleIndex);
        return;
      }

      const attendanceSearchButton = event.target.closest("[data-attendance-search]");
      if (attendanceSearchButton) {
        const searchIndex = Number.parseInt(
          attendanceSearchButton.getAttribute("data-attendance-search"),
          10
        );
        if (!Number.isInteger(searchIndex)) return;
        const selected = currentEventos[searchIndex];
        if (!selected) return;

        const input = eventsContainer.querySelector(`[data-attendance-input="${searchIndex}"]`);
        const inputValue = input ? input.value : "";
        searchAttendanceByDni(selected, searchIndex, inputValue);
        renderEvents(currentEventos);
        return;
      }

      const attendanceConfirmButton = event.target.closest("[data-attendance-confirm]");
      if (attendanceConfirmButton) {
        const confirmIndex = Number.parseInt(
          attendanceConfirmButton.getAttribute("data-attendance-confirm"),
          10
        );
        if (!Number.isInteger(confirmIndex)) return;
        const selected = currentEventos[confirmIndex];
        if (!selected) return;
        const dniValue = attendanceConfirmButton.getAttribute("data-attendance-dni");
        confirmAttendance(selected, confirmIndex, dniValue);
        renderEvents(currentEventos);
        return;
      }

      const showMoreButton = event.target.closest("[data-show-more]");
      if (showMoreButton) {
        const showMoreIndex = Number.parseInt(showMoreButton.getAttribute("data-show-more"), 10);
        if (!Number.isInteger(showMoreIndex)) return;
        const selected = currentEventos[showMoreIndex];
        if (!selected) return;
        const totalRows = Array.isArray(selected.inscripciones) ? selected.inscripciones.length : 0;
        setVisibleRows(selected, showMoreIndex, totalRows);
        renderEvents(currentEventos);
        return;
      }

      const showLessButton = event.target.closest("[data-show-less]");
      if (showLessButton) {
        const showLessIndex = Number.parseInt(showLessButton.getAttribute("data-show-less"), 10);
        if (!Number.isInteger(showLessIndex)) return;
        const selected = currentEventos[showLessIndex];
        if (!selected) return;
        setVisibleRows(selected, showLessIndex, DEFAULT_VISIBLE_ROWS);
        renderEvents(currentEventos);
        return;
      }

      const downloadButton = event.target.closest("[data-download-event]");
      if (!downloadButton) return;

      const index = Number.parseInt(downloadButton.getAttribute("data-download-event"), 10);
      if (!Number.isInteger(index)) return;

      const selected = currentEventos[index];
      if (!selected) return;

      downloadEventExcel(selected.evento || "evento", selected.inscripciones || []);
    });

    eventsContainer.addEventListener("change", (event) => {
      const attendanceRowCheckbox = event.target.closest("[data-attendance-row-toggle]");
      if (!attendanceRowCheckbox) return;

      const rowIndex = Number.parseInt(
        attendanceRowCheckbox.getAttribute("data-attendance-row-toggle"),
        10
      );
      if (!Number.isInteger(rowIndex)) return;

      const selected = currentEventos[rowIndex];
      if (!selected) return;

      const dniValue = attendanceRowCheckbox.getAttribute("data-attendance-dni");
      setAttendanceConfirmed(
        selected,
        rowIndex,
        dniValue,
        Boolean(attendanceRowCheckbox.checked)
      );
      renderEvents(currentEventos);
    });

    viewInscripcionesBtn.addEventListener("click", () => {
      setPanelView(PANEL_VIEW_INSCRIPCIONES);
    });

    viewAsistenciaBtn.addEventListener("click", () => {
      setPanelView(PANEL_VIEW_ASISTENCIA);
    });

    renderViewButtons();
    refreshBtn.addEventListener("click", loadData);
    loadData();
  </script>
</body>
</html>
