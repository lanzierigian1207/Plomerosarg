<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reconfirmación | Plomeros ARG</title>
  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --ink: #12304f;
      --line: #cddced;
      --accent: #0d63c7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: "Barlow", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(680px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 26px;
      box-shadow: 0 16px 28px rgba(16, 55, 96, 0.12);
      display: grid;
      gap: 10px;
    }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      line-height: 1.15;
    }

    p {
      color: #385d84;
      line-height: 1.5;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      border-radius: 999px;
      background: #e9f2ff;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.82rem;
      padding: 6px 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main>
    <span class="tag">Nuevo acceso</span>
    <h1>Página de Reconfirmación</h1>
    <p>
      Este acceso ya quedó activo en <strong>/reconfirmacion</strong>.
      Pasame el flujo y el contenido que querés y lo armamos acá.
    </p>
  </main>
</body>
</html>
