<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reconfirmaci&oacute;n | Plomeros ARG</title>
  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --ink: #12304f;
      --line: #cddced;
      --accent: #0d63c7;
      --ok: #0f7a45;
      --error: #ab2a22;
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: "Barlow", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 26px;
      box-shadow: 0 16px 28px rgba(16, 55, 96, 0.12);
      display: grid;
      gap: 12px;
    }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      line-height: 1.15;
    }

    p {
      color: #385d84;
      line-height: 1.5;
    }

    .input-wrap {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .input-label {
      color: var(--ink);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .input-field {
      flex: 1;
      min-width: 230px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 99, 199, 0.14);
    }

    .btn {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #ffffff;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .hint {
      font-size: 0.88rem;
      color: #57779f;
    }

    .resultado {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 8px;
      background: #f8fbff;
    }

    .resultado.ok {
      border-color: #b7deca;
      background: #f4fcf7;
    }

    .resultado.error {
      border-color: #f0bbb7;
      background: #fff3f2;
    }

    .resultado h2 {
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .resultado ul {
      margin-left: 18px;
      display: grid;
      gap: 4px;
      color: #24486f;
    }

    .encuentros-select {
      display: grid;
      gap: 8px;
    }

    .encuentro-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: 1px solid #c9dcef;
      border-radius: 10px;
      background: #ffffff;
      color: #24486f;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .encuentro-option input {
      margin-top: 3px;
      accent-color: var(--accent);
    }

    .selected-count {
      color: #355d88;
      font-size: 0.9rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Reconfirmaci&oacute;n Encuentros</h1>
    <p>Ac&aacute; vas a poder reconfirmar tu cupo para los encuentros de Plomeros ARG.</p>

    <form class="input-wrap" id="reconfirmacionForm" novalidate>
      <label class="input-label" for="reconfirmacionDato">N&uacute;mero de DNI</label>
      <div class="input-row">
        <input
          class="input-field"
          id="reconfirmacionDato"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          placeholder="Escrib&iacute; ac&aacute;"
        />
        <button class="btn" id="reconfirmacionBtn" type="submit">Consultar</button>
      </div>
      <p class="hint">Ingres&aacute; solo n&uacute;meros, sin puntos.</p>
    </form>

    <section class="resultado" id="reconfirmacionResultado" hidden aria-live="polite"></section>
  </main>

  <script>
    const form = document.getElementById("reconfirmacionForm");
    const dniInput = document.getElementById("reconfirmacionDato");
    const submitBtn = document.getElementById("reconfirmacionBtn");
    const resultBox = document.getElementById("reconfirmacionResultado");

    function normalizeDni(value) {
      return String(value ?? "").replace(/\D+/g, "").trim();
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("es-AR", {
        dateStyle: "short",
        timeStyle: "short"
      }).format(date);
    }

    function clearResultClasses() {
      resultBox.classList.remove("ok", "error");
    }

    function renderError(message) {
      clearResultClasses();
      resultBox.classList.add("error");
      resultBox.hidden = false;
      resultBox.innerHTML = "";

      const title = document.createElement("h2");
      title.textContent = "No se pudo completar la consulta";
      const text = document.createElement("p");
      text.textContent = message;

      resultBox.append(title, text);
    }

    function renderEmpty(dni) {
      clearResultClasses();
      resultBox.classList.add("ok");
      resultBox.hidden = false;
      resultBox.innerHTML = "";

      const title = document.createElement("h2");
      title.textContent = "Resultado de reconfirmacion";
      const text = document.createElement("p");
      text.textContent = `No encontramos inscripciones para el DNI ${dni}.`;

      resultBox.append(title, text);
    }

    function renderFound(data) {
      clearResultClasses();
      resultBox.classList.add("ok");
      resultBox.hidden = false;
      resultBox.innerHTML = "";

      const title = document.createElement("h2");
      title.textContent = "Resultado de reconfirmacion";
      resultBox.appendChild(title);

      if (data.nombre_apellido) {
        const name = document.createElement("p");
        name.textContent = `Titular: ${data.nombre_apellido}`;
        resultBox.appendChild(name);
      }

      const dniRow = document.createElement("p");
      dniRow.textContent = `DNI consultado: ${data.dni || "-"}`;
      resultBox.appendChild(dniRow);

      const intro = document.createElement("p");
      intro.textContent = "A que encuentro quieres Reconfirmar asistencias (Pueden ser los 2 encuentros)";
      resultBox.appendChild(intro);

      const list = document.createElement("div");
      list.className = "encuentros-select";

      const selectedCount = document.createElement("p");
      selectedCount.className = "selected-count";
      selectedCount.textContent = "Seleccionados: 0";

      let selected = 0;
      for (const item of Array.isArray(data.encuentros) ? data.encuentros : []) {
        const dateLabel = formatDate(item.ultima_inscripcion);
        const option = document.createElement("label");
        option.className = "encuentro-option";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.name = "encuentro_reconfirmacion";
        checkbox.value = item.encuentro || "";

        checkbox.addEventListener("change", () => {
          selected += checkbox.checked ? 1 : -1;
          if (selected < 0) selected = 0;
          selectedCount.textContent = `Seleccionados: ${selected}`;
        });

        const text = document.createElement("span");
        text.textContent = dateLabel
          ? `${item.encuentro} (ultima inscripcion: ${dateLabel})`
          : `${item.encuentro}`;

        option.append(checkbox, text);
        list.appendChild(option);
      }
      resultBox.appendChild(list);
      resultBox.appendChild(selectedCount);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const dni = normalizeDni(dniInput.value);

      if (!dni) {
        renderError("Ingresa un numero de DNI valido.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Consultando...";

      try {
        const response = await fetch("/api/reconfirmacion", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ dni })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Error al consultar la base de datos.");
        }

        if (!data.found) {
          renderEmpty(dni);
          return;
        }

        renderFound(data);
      } catch (error) {
        renderError(error.message || "Error inesperado.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Consultar";
      }
    });
  </script>
</body>
</html>
