<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reconfirmaci&oacute;n | Plomeros ARG</title>
  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --ink: #12304f;
      --line: #cddced;
      --accent: #0d63c7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: "Barlow", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(680px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 26px;
      box-shadow: 0 16px 28px rgba(16, 55, 96, 0.12);
      display: grid;
      gap: 10px;
    }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      line-height: 1.15;
    }

    p {
      color: #385d84;
      line-height: 1.5;
    }

    .input-wrap {
      display: grid;
      gap: 8px;
      margin-top: 6px;
    }

    .input-label {
      color: var(--ink);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .input-field {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 99, 199, 0.14);
    }
  </style>
</head>
<body>
  <main>
    <h1>Reconfirmaci&oacute;n Encuentros</h1>
    <p>Ac&aacute; vas a poder reconfirmar tu cupo para los encuentros de Plomeros ARG.</p>
    <div class="input-wrap">
      <label class="input-label" for="reconfirmacionDato">N&uacute;mero de DNI</label>
      <input
        class="input-field"
        id="reconfirmacionDato"
        type="text"
        placeholder="Escrib&iacute; ac&aacute;"
      />
    </div>
  </main>
</body>
</html>
