<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/Prueba_2/assets/logo-plomeros-circular.png">
  <link rel="apple-touch-icon" href="/Prueba_2/assets/logo-plomeros-circular.png">
  <title>Certificados | Plomeros ARG</title>
  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --ink: #12304f;
      --line: #cddced;
      --accent: #0d63c7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      font-family: "Barlow", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 28px;
      box-shadow: 0 16px 28px rgba(16, 55, 96, 0.12);
      display: grid;
      gap: 14px;
    }

    .intro-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.3rem);
      line-height: 1.15;
    }

    p {
      color: #385d84;
      line-height: 1.5;
    }

    .intro-logo {
      width: 90px;
      height: 90px;
      border-radius: 999px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .selector-box {
      border: 1px solid #d8e4f1;
      border-radius: 12px;
      padding: 14px;
      background: #f8fbff;
      display: grid;
      gap: 10px;
    }

    .selector-title {
      font-size: 1rem;
      font-weight: 800;
      color: #153b62;
    }

    .selector-hint {
      color: #385d84;
      font-size: 0.92rem;
    }

    .encuentros-list {
      display: grid;
      gap: 8px;
    }

    .encuentro-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: 1px solid #c9dcef;
      border-radius: 10px;
      background: #ffffff;
      color: #24486f;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .encuentro-option input {
      margin-top: 3px;
      accent-color: var(--accent);
    }

    .status-box {
      border: 1px solid #d8e4f1;
      border-radius: 12px;
      padding: 12px;
      background: #ffffff;
      color: #234569;
      font-weight: 600;
    }

    .status-box.error {
      border-color: #f0c8c4;
      background: #fff5f4;
      color: #7f2a24;
    }

    .form-message {
      color: #7f2a24;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .resultado-box {
      border: 1px solid #b7deca;
      border-radius: 12px;
      padding: 14px;
      background: #f4fcf7;
      display: grid;
      gap: 10px;
    }

    .resultado-title {
      color: #0f5c35;
      font-weight: 800;
    }

    .resultado-events {
      color: #24486f;
      font-size: 0.93rem;
      font-weight: 700;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-weight: 700;
      color: #153b62;
    }

    .field input {
      border: 1px solid #b8cee6;
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 99, 199, 0.14);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 11px 14px;
      font-weight: 700;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-secondary {
      background: #ffffff;
      color: var(--accent);
      border-color: var(--accent);
    }

    @media (max-width: 560px) {
      .intro-logo {
        width: 74px;
        height: 74px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="intro-head" aria-label="Encabezado certificados">
      <div>
        <h1>Certificados</h1>
        <p>Ac&aacute; vas a poder gestionar tu certificado de asistencia a los encuentros de Plomeros ARG.</p>
      </div>
      <img
        class="intro-logo"
        src="/Prueba_2/assets/logo-plomeros-circular.png"
        alt="Logo Plomeros ARG"
        width="90"
        height="90"
      >
    </section>

    <section class="selector-box" aria-label="Selector de encuentros">
      <h2 class="selector-title">Seleccion&aacute; los encuentros</h2>
      <p class="selector-hint">Eleg&iacute; uno o ambos encuentros para continuar.</p>
      <div class="encuentros-list" id="encuentrosList">
        <label class="encuentro-option" for="encuentroBahiaBlanca">
          <input
            id="encuentroBahiaBlanca"
            type="checkbox"
            name="encuentro_activo"
            value="Bah&iacute;a Blanca 11/3"
          >
          <span>Bah&iacute;a Blanca 11/3</span>
        </label>
        <label class="encuentro-option" for="encuentroMarDelPlata">
          <input
            id="encuentroMarDelPlata"
            type="checkbox"
            name="encuentro_activo"
            value="Mar del Plata 14/3"
          >
          <span>Mar del Plata 14/3</span>
        </label>
      </div>
      <button class="btn btn-primary" id="continuarCertificadoBtn" type="button">Continuar</button>
      <p class="form-message" id="formMessage" hidden></p>
    </section>

    <section class="resultado-box" id="resultadoBox" hidden aria-live="polite">
      <p class="resultado-title">Ac&aacute; se genera tu certificado de asistencias</p>
      <p class="resultado-events" id="resultadoEventos"></p>
      <div class="field">
        <label for="nombreCertificado">Nombre y apellido</label>
        <input
          id="nombreCertificado"
          name="nombreCertificado"
          type="text"
          placeholder="Escrib&iacute; tu nombre"
          maxlength="120"
        >
      </div>
    </section>

    <div class="actions">
      <a class="btn btn-primary" href="/encuentros.html">Ver encuentros</a>
      <a class="btn btn-secondary" href="/index.html">Volver al inicio</a>
    </div>
  </main>
  <script>
    const continuarBtn = document.getElementById("continuarCertificadoBtn");
    const formMessage = document.getElementById("formMessage");
    const resultadoBox = document.getElementById("resultadoBox");
    const resultadoEventos = document.getElementById("resultadoEventos");
    const nombreCertificado = document.getElementById("nombreCertificado");

    continuarBtn.addEventListener("click", () => {
      formMessage.hidden = true;
      formMessage.textContent = "";

      const checked = Array.from(
        document.querySelectorAll("input[name=\"encuentro_activo\"]:checked")
      ).map((input) => input.value);

      if (checked.length === 0) {
        formMessage.textContent = "Seleccion&aacute; al menos un encuentro para continuar.";
        formMessage.hidden = false;
        resultadoBox.hidden = true;
        return;
      }

      resultadoEventos.textContent = `Encuentro(s) seleccionado(s): ${checked.join(", ")}`;
      resultadoBox.hidden = false;
      nombreCertificado.focus();
    });
  </script>
</body>
</html>
